<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Week 8 · Final Demo + Reckoning · INFO-T 100</title>
  <meta name="description" content="Week 8 of INFO-T 100: a 90-minute capstone session. Three demo rounds (pairs · table · open studio), a 5 Big Ideas reckoning against the vault, and a one-paragraph trajectory for what comes after the course." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500;1,9..144,600&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../tokens.css" />

  <style>
    html, body { margin: 0; padding: 0; background: var(--paper-50); color: var(--ink-900); font-family: var(--font-body); }
    :root {
      --signal-amber-text: #B8851D;
      --signal-red-text:   #B83A22;
      --signal-blue-text:  #3A5FA8;
      --signal-green-text: #3F8A56;
      --signal-purple-text: #5C418F;
    }
    .skip-link { position: absolute; left: -9999px; }
    .skip-link:focus { left: 8px; top: 8px; background: var(--ink-900); color: #fff; padding: 8px 12px; z-index: 100; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root">
    <p style="padding:32px;font:16px/1.5 system-ui,sans-serif;color:#5A523F;">Loading Week 8: Final Demo + Reckoning…</p>
  </div>
  <noscript>
    <div style="max-width:640px;margin:60px auto;padding:24px 28px;background:#FBF7F0;border:2px solid #16140F;font:16px/1.55 system-ui,sans-serif;">
      <h1 style="font-family:Georgia,serif;font-style:italic;margin:0 0 10px;">JavaScript needed</h1>
      <p>This interactive module renders with React. Please enable JavaScript to use this lesson.</p>
    </div>
  </noscript>

  <script type="text/babel" src="fd-sections/00-rollcall.jsx"></script>
  <script type="text/babel" src="fd-sections/01-coldopen.jsx"></script>
  <script type="text/babel" src="fd-sections/02-pairs.jsx"></script>
  <script type="text/babel" src="fd-sections/03-table.jsx"></script>
  <script type="text/babel" src="fd-sections/04-studio.jsx"></script>
  <script type="text/babel" src="fd-sections/05-reckoning.jsx"></script>
  <script type="text/babel" src="fd-sections/06-trajectory.jsx"></script>
  <script type="text/babel" src="async-track.jsx"></script>
  <script type="text/babel" src="engagement.jsx"></script>
  <script type="text/babel" src="media-slot.jsx"></script>
  <script type="text/babel" src="course-arc.jsx"></script>
  <script type="text/babel" src="capture-template.jsx"></script>

  <script type="text/babel">
    const sections = [
      { id: 'rollcall', label: 'Roll call · vault',   time: '10 min', Cmp: window.FDSectionRollCall },
      { id: 'cold',     label: 'Cold open',           time: '5 min',  Cmp: window.FDSectionColdOpen },
      { id: 'pairs',    label: 'Round 1 · pairs',     time: '15 min', Cmp: window.FDSectionPairs },
      { id: 'table',    label: 'Round 2 · table',     time: '20 min', Cmp: window.FDSectionTable },
      { id: 'studio',   label: 'Round 3 · open studio', time: '15 min', Cmp: window.FDSectionStudio },
      { id: 'reckon',   label: 'Reckoning · 5 ideas', time: '15 min', Cmp: window.FDSectionReckoning },
      { id: 'traj',     label: 'Trajectory',          time: '10 min', Cmp: window.FDSectionTrajectory },
    ];

    const asyncTrack = [
      { refId: 'rollcall', label: 'Roll call · count your vault', soloTime: '10 min',
        activity: 'Open your vault. Count notes per folder. Enter the numbers in the form on this page. The total IS the warm-up.',
        deliverable: 'Counts saved in browser. No posting required.' },
      { refId: 'cold', label: 'Cold open · advice to W1 you', soloTime: '5 min',
        activity: 'Read the W1 cold-open transcript (or watch when available). Write the one sentence you would tell yourself eight weeks ago.',
        deliverable: 'Optional: post to the cohort Discord. The strongest become next year\'s W1 cold-open clips.' },
      { refId: 'pairs', label: 'Round 1 · async pair', soloTime: '20 min',
        activity: 'Async students partner up via the W8 pair-thread on Canvas. Post a 2-min screen recording of your demo + a written 3-sentence trajectory. Get matched with one classmate by Wednesday; reply with one observation + one question by Friday.',
        deliverable: 'Canvas → Week 8 → "Pair demo" thread.',
        peerLoop: 'Replies due 48 h after pair posted.' },
      { refId: 'table', label: 'Round 2 · async table-of-4', soloTime: '25 min',
        activity: 'Same recording, posted to your Canvas group of 4. Watch the other three. One observation per peer in the form on this page.',
        deliverable: 'Three peer notes captured.',
        peerLoop: 'Group of 4 assigned by facilitator Thu morning; observations due Sun.' },
      { refId: 'studio', label: 'Round 3 · open thread', soloTime: '15 min',
        activity: 'For async, the open studio runs as the master Canvas thread for the whole cohort. Post your demo recording. Visit at least three other students\' demos.',
        deliverable: 'Add visitors to the form on this page as you receive comments on your post.' },
      { refId: 'reckon', label: 'Reckoning', soloTime: '20 min',
        activity: 'Five textareas, one per Big Idea. Reference vault notes. Re-record the trust dial inside Big Idea #5. Auto-saves.',
        deliverable: 'Saved to Reflections/W08-reckoning.md when you copy across.' },
      { refId: 'traj', label: 'Trajectory + final export', soloTime: '15 min',
        activity: 'Three fields → one paragraph. Run the final Export-your-work .txt. Drop into Canvas.',
        deliverable: 'Canvas → Week 8 → "Final reckoning + trajectory" assignment (text + .txt attachment).' },
    ];

    const engagement = {
      selfChecks: {
        rollcall: {
          question: 'Looking at your vault count: which folder has the LEAST in it, and what does that tell you about your habits this term?',
          hint: 'The empty folder is the data. It usually points at a Big Idea you skipped.',
          answer: 'Common pattern: Sources/ is sparse — students didn\'t externalize credibility. Or Bugs/ is sparse — students didn\'t structure their stuck-moments. The thin folder names what to grow next semester.'
        },
        cold: {
          question: 'In your sentence to W1-you: would 50% of THIS room\'s W1 cohort have followed that advice if they\'d heard it on Day 1? Why or why not?',
          hint: 'The most useful advice is often the advice you couldn\'t actually take eight weeks ago.',
          answer: 'Honest answer: most W1 students hear "start before you feel ready" and nod. But they don\'t actually act on it until something breaks at W4 or W5. Advice landing requires consequence-context — that\'s why W14-looking-back framing exists.'
        },
        pairs: {
          question: 'Your partner gave a vague observation. What\'s your follow-up?',
          hint: 'Same move as W4 first public test.',
          answer: '"What\'s the first thing you\'d change if you owned this?" Forces specificity. If they still can\'t name something, that\'s information too — it means your demo didn\'t land sharply enough.'
        },
        table: {
          question: 'What\'s the difference between feedback you GET and feedback you USE?',
          hint: 'Three peer observations, but you might only act on one. That\'s OK.',
          answer: 'Feedback you GET is data. Feedback you USE is choice. The reckoning step asks you to pick one observation to act on by W8+1 — that\'s the bridge between getting and using.'
        },
        studio: {
          question: 'A faculty observer asked a sharp question and you fumbled. What do you do later?',
          hint: 'The answer isn\'t "feel bad about it."',
          answer: 'Capture the question in your vault Bugs/ folder. The fumbled question is now a future-debugging target. Most "I should have said…" moments only become useful if they\'re externalized — otherwise they cycle as anxiety.'
        },
        reckon: {
          question: 'Of the 5 Big Ideas, which one DIDN\'T land for you this term — and what would have to be different next time for it to land?',
          hint: 'The honest answer here is more useful than 5 polished answers.',
          answer: 'Strong responses name a specific Big Idea + a specific structural reason. ("#3 Time as system didn\'t land because I never trusted the audit grid.") The instructor uses these to redesign next year.'
        },
        traj: {
          question: 'In two months, when this trajectory paragraph is buried in your vault, will the version of you reading it know what to do? What\'s a clue you can plant for them?',
          hint: 'Future-you doesn\'t remember today the way present-you does.',
        },
      },
      reflection: {
        title: 'Final Demo + Reckoning · reflection',
        intro: 'Three short prompts. Auto-saves as you type. Hit "Copy for Canvas" when you\'re done — and then run the final Export-your-work .txt below to ship the closing artifact.',
        prompts: [
          'What\'s the single most useful thing you carried out of this course — the one that will still matter in Year 3?',
          'What\'s one thing you\'d redesign about this course if you ran it next semester?',
          'When does this course\'s benefit show up — in the next month, the next semester, or beyond? Why?',
        ],
      },
    };

    const media = {
      cold: {
        type: 'placeholder',
        label: 'cold-open clip',
        caption: 'Cold open · the loop closes',
        src: '',
        transcript:
`Eight weeks ago you sat in this room, or one like it. You'd just heard the W1 Spawn Point cold open — three students, three Week-14 trajectories, a question hanging in the air about what kind of student you'd be by W14.

You weren't W14 student yet. You're now. The Week-14 student in the back row that the cold open referenced is — literally — you, today, looking at the W1 student you used to be.

Take a second with that. The loop closed. The question that opened the course is now the question we close it with: what would you tell the Week-1 you, sitting in this room eight weeks ago?

You have an answer now that you didn't have then. Even if your project didn't ship the way you wanted, even if the trust dial didn't move the way you predicted, even if the vault is sparser than you wanted it to be — you have an answer that's earned, not theoretical.

Write it down. One sentence. The strongest of these become the cold-open clips next year. Your W1-self, three weeks from now, might literally hear your voice on the first day of INFO-T 100 next fall.`
      },
    };

    const captureTemplate = {
      title: 'Final Demo + Reckoning · Obsidian capture',
      target: 'Reflections/W08-final.md',
      intro: 'The closing capture template. Drop it in, fill it as you move through the lesson — by end of class you\'ll have a single note that holds the demo log, the 5 Big Ideas reckoning, the trajectory paragraph, and the trust-dial movement.',
      markdown: `---
type: lesson
week: 08
lesson: Final Demo + Reckoning
date:${' '}
status: closing
trust_w6:${' '}
trust_w8:${' '}
---

# Final Demo + Reckoning — Week 8

## Anchor question
Did I ship — and what does my vault show?

## Vault count (roll call)
- Weeks/:${' '}
- Project/:${' '}
- Bugs/:${' '}
- Reflections/:${' '}
- Sources/:${' '}
- TOTAL:${' '}

## Advice to my W1 self
${' '}

## Demo round 1 · pair
- Partner:${' '}
- Their observation:${' '}
- Their question:${' '}

## Demo round 2 · table of 4
- Peer 1 observation:${' '}
- Peer 2 observation:${' '}
- Peer 3 observation:${' '}

## Demo round 3 · open studio visitors
-${' '}

## Reckoning · 5 Big Ideas
1. **Iteration:**${' '}
2. **Verbs over tools:**${' '}
3. **Time as system:**${' '}
4. **Externalize:**${' '}
5. **AI as collaborator:**${' '}

## Trust dial · re-rated
- W6 score:${' '}
- W8 score:${' '}
- Why it moved:${' '}

## Trajectory
By **[when]**, I'm going to ship **[what]**. The habit from this course that will get me there is **[habit]**.

## Reflection
> The single most useful thing I carry forward:

> What I'd redesign about this course:

> When this course's benefit shows up:

## Links / vault references
- [[Project/seed]]
- [[Project/v0.1]]
- [[Bugs/...]]
- [[Reflections/W04-reckoning]]
`,
    };

    function App() {
      const [active, setActive] = React.useState('rollcall');

      React.useEffect(() => {
        const opts = { rootMargin: '-30% 0px -55% 0px', threshold: 0 };
        const obs = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); });
        }, opts);
        sections.forEach(s => {
          const el = document.getElementById(s.id);
          if (el) obs.observe(el);
        });
        return () => obs.disconnect();
      }, []);

      const goto = (id) => {
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' });
      };

      return (
        <div style={{ position: 'relative' }}>
          <header style={topBar.bar}>
            <div style={topBar.left}>
              <span style={topBar.iuMark}>IU</span>
              <span style={topBar.crumb}>INFO-T 100 · WEEK 08</span>
            </div>
            <div style={topBar.center}>
              <span style={topBar.title}>Final Demo + Reckoning</span>
            </div>
            <div style={topBar.right}>
              <span style={topBar.chip}>⏱ 90 min</span>
              <span style={{ ...topBar.chip, background: 'var(--signal-green)', color: '#fff', borderColor: 'var(--signal-green)' }}>4 deliverables</span>
              <button type="button" className="lesson-print-btn" onClick={() => window.print()}>Print worksheet</button>
            </div>
          </header>

          <nav style={rail.nav} aria-label="Module sections">
            <div style={rail.head}>CLASS FLOW</div>
            <div style={rail.list}>
              {sections.map((s, i) => (
                <button
                  key={s.id}
                  onClick={() => goto(s.id)}
                  aria-current={active === s.id ? 'location' : undefined}
                  aria-label={`Section ${i+1}: ${s.label}, ${s.time}`}
                  style={{ ...rail.item, ...(active === s.id ? rail.itemActive : {}) }}
                >
                  <span style={rail.idx}>{i.toString().padStart(2,'0')}</span>
                  <span style={rail.lbl}>{s.label}</span>
                  <span style={rail.time}>{s.time}</span>
                </button>
              ))}
            </div>
            <a href="../index.html" style={rail.back}>← Back to canvas</a>
          </nav>

          <main id="main-content" style={main.wrap}>
            <div style={{ paddingTop: 28 }}>
              {window.CourseArc && <window.CourseArc currentKey="final-demo" />}
              {window.AsyncTrack && (
                <window.AsyncTrack
                  data={asyncTrack}
                  lessonKey="final-demo"
                  totalTime="~110 min across the week"
                  canvasHub="Canvas → Week 8 module"
                  intro={<><strong>Heads up:</strong> async mirror of Week 8. Demo rounds run as Canvas threads (pair · table-of-4 · open). The reckoning and trajectory are the same for both tracks. The final Export-your-work .txt is the closing artifact, due Sunday for everyone.</>}
                />
              )}
            </div>

            {sections.map((s) => {
              const C = s.Cmp;
              const sc = engagement.selfChecks[s.id];
              const m = media[s.id];
              return (
                <section id={s.id} key={s.id} data-screen-label={`${s.label}`} style={main.section}>
                  {m && window.MediaSlot && (
                    <window.MediaSlot data={m} lessonKey="final-demo" sectionId={s.id} />
                  )}
                  {C ? <C /> : <div style={{ padding: 80, color: 'var(--signal-red)' }}>Missing: {s.id}</div>}
                  {sc && window.SelfCheck && (
                    <window.SelfCheck data={sc} lessonKey="final-demo" sectionId={s.id} />
                  )}
                </section>
              );
            })}

            {window.ReflectionJournal && (
              <window.ReflectionJournal data={engagement.reflection} lessonKey="final-demo">
                {window.ExportWork && (
                  <window.ExportWork lessonKey="final-demo" lessonTitle="Week 8 · Final Demo + Reckoning" />
                )}
              </window.ReflectionJournal>
            )}

            {window.CaptureTemplate && (
              <window.CaptureTemplate data={captureTemplate} />
            )}

            <footer style={main.foot}>
              <div style={{ color: 'var(--ink-300)', marginBottom: 18, fontFamily: 'var(--font-mono)', fontSize: 11, whiteSpace: 'pre' }} aria-hidden="true">
{`+--------------------------------------------------------+
|  W08  ·  shipped + externalized  ·  loop closed  ·  yours  |
+--------------------------------------------------------+`}
              </div>
              <div style={{ fontFamily: 'var(--font-display)', fontSize: 26, fontStyle: 'italic', color: 'var(--ink-500)' }}>
                You started with a <span style={{ color: 'var(--crimson)' }}>seed</span>. You leave with a <span style={{ color: 'var(--crimson)' }}>vault</span> and a <span style={{ color: 'var(--crimson)' }}>v1</span>.
              </div>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-300)', letterSpacing: '0.15em', marginTop: 28 }}>
                INFO-T 100 · v2.0 · 2026
              </div>
            </footer>
          </main>
        </div>
      );
    }

    const topBar = {
      bar: { position: 'sticky', top: 0, zIndex: 50, display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'center', padding: '12px 32px', background: 'var(--ink-900)', color: 'var(--paper-100)', borderBottom: '3px solid var(--crimson)' },
      left: { display: 'flex', alignItems: 'center', gap: 12, justifySelf: 'start' },
      center: { justifySelf: 'center' },
      right: { display: 'flex', gap: 10, justifySelf: 'end', alignItems: 'center' },
      iuMark: { width: 26, height: 26, background: 'var(--crimson)', color: '#fff', fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 13, fontStyle: 'italic', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' },
      crumb: { fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--paper-300)', letterSpacing: '0.1em' },
      title: { fontFamily: 'var(--font-display)', fontSize: 18, fontWeight: 600, fontStyle: 'italic', color: 'var(--paper-50)' },
      chip: { fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.05em', border: '1px solid var(--paper-300)', color: 'var(--paper-100)', padding: '4px 8px', borderRadius: 3 },
    };

    const rail = {
      nav: { position: 'fixed', top: 80, left: 32, width: 220, background: 'var(--paper-100)', border: '1px solid var(--paper-200)', padding: '18px 14px 14px', borderRadius: 6, boxShadow: 'var(--shadow-paper)', zIndex: 20 },
      head: { fontFamily: 'var(--font-mono)', fontSize: 10, fontWeight: 700, color: 'var(--ink-900)', letterSpacing: '0.18em', marginBottom: 14, paddingBottom: 10, borderBottom: '2px solid var(--ink-900)' },
      list: { display: 'flex', flexDirection: 'column', gap: 2 },
      item: { display: 'grid', gridTemplateColumns: '24px 1fr auto', alignItems: 'center', gap: 8, background: 'transparent', border: 'none', cursor: 'pointer', padding: '8px 10px', borderRadius: 3, textAlign: 'left', color: 'var(--ink-700)', fontFamily: 'var(--font-body)', fontSize: 12.5 },
      itemActive: { background: 'var(--ink-900)', color: 'var(--paper-50)' },
      idx: { fontFamily: 'var(--font-mono)', fontSize: 10, opacity: 0.7 },
      lbl: { fontWeight: 600 },
      time: { fontFamily: 'var(--font-mono)', fontSize: 9.5, opacity: 0.7 },
      back: { display: 'block', marginTop: 16, paddingTop: 12, borderTop: '1px dashed var(--paper-300)', fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-500)', textDecoration: 'none', textAlign: 'center' },
    };

    const main = {
      wrap: { marginLeft: 280, padding: '0 56px 0 24px', maxWidth: 1100 },
      section: { padding: '60px 0', borderBottom: '1px solid var(--paper-200)', minHeight: 'min-content' },
      foot: { padding: '90px 0 120px', textAlign: 'center' },
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
