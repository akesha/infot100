<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Week 4 · Project Seed v0.1 · CSCI-Y100</title>
  <meta name="description" content="Week 4 of CSCI-Y100: a 90-minute studio session. The Spawn Point seed becomes a touchable v0.1 in git. Studio-style classroom with TAs floating, music allowed, build is sacred." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500;1,9..144,600&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../tokens.css" />

  <style>
    html, body { margin: 0; padding: 0; background: var(--paper-50); color: var(--ink-900); font-family: var(--font-body); }
    :root {
      --signal-amber-text: #B8851D;
      --signal-red-text:   #B83A22;
      --signal-blue-text:  #3A5FA8;
      --signal-green-text: #3F8A56;
      --signal-purple-text: #5C418F;
    }
    .skip-link { position: absolute; left: -9999px; }
    .skip-link:focus { left: 8px; top: 8px; background: var(--ink-900); color: #fff; padding: 8px 12px; z-index: 100; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root">
    <p style="padding:32px;font:16px/1.5 system-ui,sans-serif;color:#5A523F;">Loading Week 4: Project Seed v0.1…</p>
  </div>
  <noscript>
    <div style="max-width:640px;margin:60px auto;padding:24px 28px;background:#FBF7F0;border:2px solid #16140F;font:16px/1.55 system-ui,sans-serif;">
      <h1 style="font-family:Georgia,serif;font-style:italic;margin:0 0 10px;">JavaScript needed</h1>
      <p>This interactive module renders with React. Please enable JavaScript to use this lesson.</p>
    </div>
  </noscript>

  <script type="text/babel" src="ps-sections/00-coldopen.jsx"></script>
  <script type="text/babel" src="ps-sections/01-seed.jsx"></script>
  <script type="text/babel" src="ps-sections/02-carve.jsx"></script>
  <script type="text/babel" src="ps-sections/03-build.jsx"></script>
  <script type="text/babel" src="ps-sections/04-test.jsx"></script>
  <script type="text/babel" src="ps-sections/05-reckon.jsx"></script>
  <script type="text/babel" src="ps-sections/06-takehome.jsx"></script>
  <script type="text/babel" src="async-track.jsx"></script>
  <script type="text/babel" src="engagement.jsx"></script>
  <script type="text/babel" src="media-slot.jsx"></script>
  <script type="text/babel" src="course-arc.jsx"></script>
  <script type="text/babel" src="capture-template.jsx"></script>

  <script type="text/babel">
    const sections = [
      { id: 'cold',   label: 'Cold open',           time: '5 min',  Cmp: window.PSSectionColdOpen },
      { id: 'seed',   label: 'Re-read your seed',   time: '10 min', Cmp: window.PSSectionSeed },
      { id: 'carve',  label: 'Carve v0.1',          time: '15 min', Cmp: window.PSSectionCarve },
      { id: 'build',  label: 'Build · 35 min',      time: '35 min', Cmp: window.PSSectionBuild },
      { id: 'test',   label: 'First public test',   time: '10 min', Cmp: window.PSSectionTest },
      { id: 'reckon', label: 'Reckon',              time: '10 min', Cmp: window.PSSectionReckon },
      { id: 'home',   label: 'Take-home',           time: '5 min',  Cmp: window.PSSectionTakeHome },
    ];

    const asyncTrack = [
      { refId: 'cold', label: 'Cold open', soloTime: '5 min',
        activity: 'Read the cold-open transcript on this page. Answer the warm-up "imperfect work I respected" question — it auto-saves.',
        deliverable: 'Private — no posting required.' },
      { refId: 'seed', label: 'Re-read your seed', soloTime: '12 min',
        activity: 'Open Obsidian → Project/seed.md from W1. Read it. Mark what changed in your head since W1 in the form on this page.',
        deliverable: 'Saved to Project/seed-v04-revision.md in your vault.' },
      { refId: 'carve', label: 'Carve v0.1', soloTime: '20 min',
        activity: 'Three boxes (WHO/WHAT/HOW SOMEONE TESTS). Auto-saves as you type. Constraint: testable by another human in under 5 minutes.',
        deliverable: 'Three boxes complete on this page.' },
      { refId: 'build', label: 'Build', soloTime: '40 min · or split across 2 days',
        activity: 'Use the in-page timer. Run it for 35 minutes (or pause/resume across two sittings). Update the "what I\'m working on" textarea every few minutes.',
        deliverable: 'Code/prototype/document in git. Notes captured on this page.' },
      { refId: 'test', label: 'First public test (async)', soloTime: '15 min',
        activity: 'Post your v0.1 to the W4 Discussion thread. Comment on TWO classmates\' v0.1 posts — one observation + one question on each.',
        deliverable: 'Canvas → Week 4 → "v0.1 public test" Discussion. 1 post + 2 replies.',
        peerLoop: 'Replies due within 48 hours of your post.' },
      { refId: 'reckon', label: 'Reckon', soloTime: '12 min',
        activity: 'Three textareas in the form below. Under 60 words total. Word counter is live.',
        deliverable: 'Saved to Reflections/W04-reckoning.md in your vault.' },
      { refId: 'home', label: 'Take-home', soloTime: '5 min',
        activity: 'Same as the in-class take-home: stage, commit, push to GitHub. Three lines in your Start Log.',
        deliverable: 'Start Log entries — facilitator spot-checks during 1:1s.' },
    ];

    const engagement = {
      selfChecks: {
        cold: {
          question: 'In one sentence: why is "the un-polished side is the lesson" load-bearing for this course?',
          hint: 'Consider what you would NOT learn if you only saw polished work.',
          answer: 'Strong responses: polished work hides the iteration that produced it. If you only see v1, you don\'t know how to get from a blank page to v0.1 — and that\'s the actual skill the course is teaching.'
        },
        seed: {
          question: 'What\'s a good reason for your seed to have moved since W1 — and what\'s a bad one?',
          hint: 'Movement isn\'t bad on its own. The reason for movement matters.',
          answer: 'Good: you learned something in W2/W3 that changed how you see the problem. Bad: you got bored or scared and pivoted to something easier without doing the work.'
        },
        carve: {
          question: 'Why is "testable by another human in under 5 minutes" the constraint, instead of "compiles" or "ships"?',
          hint: 'Compiling and shipping are technical. Testing is social.',
          answer: 'Testable means someone else can engage with it. Code that compiles but does nothing visible is not testable. The 5-minute constraint forces you to think about audience interaction, not just code correctness.'
        },
        build: {
          question: 'In the build block, which is more dangerous — getting stuck on one bug, or NOT getting stuck on any bug?',
          hint: 'Trick question. Both have failure modes.',
          answer: 'Getting stuck for &gt; 25 min without asking for help is dangerous. So is "not getting stuck" — usually that means you\'re not pushing past your comfort zone. v0.1 should produce at least one stuck moment. If it doesn\'t, the bar was too low.'
        },
        test: {
          question: 'Your partner gave you "looks good!" as their observation. What do you do?',
          hint: 'That\'s not feedback. The job is to ask back.',
          answer: 'Ask: "What\'s the first thing you\'d change if you owned this?" Specific feedback requires specific asks. The good news: most people CAN give specific feedback when you give them a specific prompt.'
        },
        reckon: {
          question: 'Why is the 60-word cap on the reckoning the actual constraint — what does it stop you from doing?',
          hint: 'It stops a specific failure mode that long-form reflections fall into.',
          answer: 'It stops vague Yelp-review reflections ("I learned a lot today, this was a great class"). 60 words isn\'t enough room for vagueness — you have to name specifics or the sentence dies.'
        },
        home: {
          question: 'Six weeks from now, when you grep your git log for what you shipped today, will the commit message tell you anything? If not, what should you change?',
          hint: 'Pre-mortem. Future-you is the audience for this commit message.',
        },
      },
      reflection: {
        title: 'Project Seed v0.1 reflection',
        intro: 'Three short prompts. Auto-saves as you type. Hit "Copy for Canvas" when you\'re done and paste into the Week 4 reflection assignment.',
        prompts: [
          'Looking at v0.1 right now: what surprised you about how big or small "shipping" actually was?',
          'Which classmate observation will you actually act on by W5? What\'s the smallest move?',
          'If you had another 35 minutes today, would you spend them on what shipped or what didn\'t? Why?',
        ],
      },
    };

    const media = {
      cold: {
        type: 'placeholder',
        label: 'cold-open clip',
        caption: 'Cold open · the gap',
        src: '',
        transcript:
`There is a gap between an idea and a thing someone can touch. Most of you have only ever seen the polished side of other people's work — finished apps, finished essays, finished demos. The unpolished side is invisible to you because nobody publishes it.

Today, in 90 minutes, you're going to ship the unpolished side of yours. The version we make today is not impressive. The fact that it exists is the lesson.

Most freshmen in CS never ship in their first year. They take notes, pass quizzes, write small assignment scripts, and arrive at sophomore year having never produced a thing someone else could touch. The cost is iteration tolerance — they fear rewrites, fear ugly first drafts, fear public-facing work.

We're going to take that off the table today. v0.1 is on purpose — the smallest, ugliest version that ships. The bar is below your fear so iteration starts on Day 1, not Week 12.

Studio-style classroom. TAs floating. Music allowed. The 35-minute build block is the load-bearing one — protect it. Stuck for &gt; 4 min? Raise a hand.`
      },
    };

    const captureTemplate = {
      title: 'Project Seed v0.1 · Obsidian capture',
      target: 'Weeks/W04-project-seed-v01.md',
      intro: 'Drop this template into your vault. Fill it in as you build. The fields mirror the in-class flow — by end of class you\'ll have a working note that doubles as your reckoning.',
      markdown: `---
type: lesson
week: 04
lesson: Project Seed v0.1
date:${' '}
status: open
github_commit:${' '}
---

# Project Seed v0.1 — Week 4

## Anchor question
Can I ship — and document — a real thing?

## v0.1 carved
- WHO:${' '}
- WHAT:${' '}
- HOW SOMEONE TESTS IT:${' '}

## Build · what I worked on
${' '}

## First public test · partners
- Partner 01:${' '}
  - Yellow sticky (observation):${' '}
  - Pink sticky (question):${' '}
- Partner 02:${' '}
  - Yellow sticky:${' '}
  - Pink sticky:${' '}

## Reckoning · under 60 words
- What shipped:${' '}
- What didn't:${' '}
- What W5 needs:${' '}

## Take-home log
- GitHub commit URL:${' '}
- Commit message:${' '}

## Reflection
> What surprised me about how big or small "shipping" actually was:

> The classmate observation I'll actually act on by W5:

> If I had another 35 minutes today, I'd spend them on:

## Links / related
- [[Project/seed]]
- [[Bugs/...]]
`,
    };

    function App() {
      const [active, setActive] = React.useState('cold');

      React.useEffect(() => {
        const opts = { rootMargin: '-30% 0px -55% 0px', threshold: 0 };
        const obs = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); });
        }, opts);
        sections.forEach(s => {
          const el = document.getElementById(s.id);
          if (el) obs.observe(el);
        });
        return () => obs.disconnect();
      }, []);

      const goto = (id) => {
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' });
      };

      return (
        <div style={{ position: 'relative' }}>
          <header style={topBar.bar}>
            <div style={topBar.left}>
              <span style={topBar.iuMark}>IU</span>
              <span style={topBar.crumb}>CSCI-Y100 · WEEK 04</span>
            </div>
            <div style={topBar.center}>
              <span style={topBar.title}>Project Seed v0.1 · the first real ship</span>
            </div>
            <div style={topBar.right}>
              <span style={topBar.chip}>⏱ 90 min</span>
              <span style={{ ...topBar.chip, background: 'var(--signal-green)', color: '#fff', borderColor: 'var(--signal-green)' }}>4 deliverables</span>
              <button type="button" className="lesson-print-btn" onClick={() => window.print()}>Print worksheet</button>
            </div>
          </header>

          <nav style={rail.nav} aria-label="Module sections">
            <div style={rail.head}>CLASS FLOW</div>
            <div style={rail.list}>
              {sections.map((s, i) => (
                <button
                  key={s.id}
                  onClick={() => goto(s.id)}
                  aria-current={active === s.id ? 'location' : undefined}
                  aria-label={`Section ${i+1}: ${s.label}, ${s.time}`}
                  style={{ ...rail.item, ...(active === s.id ? rail.itemActive : {}) }}
                >
                  <span style={rail.idx}>{i.toString().padStart(2,'0')}</span>
                  <span style={rail.lbl}>{s.label}</span>
                  <span style={rail.time}>{s.time}</span>
                </button>
              ))}
            </div>
            <a href="../index.html" style={rail.back}>← Back to canvas</a>
          </nav>

          <main id="main-content" style={main.wrap}>
            <div style={{ paddingTop: 28 }}>
              {window.CourseArc && <window.CourseArc currentKey="project-seed-v01" />}
              {window.AsyncTrack && (
                <window.AsyncTrack
                  data={asyncTrack}
                  lessonKey="project-seed-v01"
                  totalTime="~110 min"
                  canvasHub="Canvas → Week 4 module"
                  intro={<><strong>Heads up:</strong> async mirror of Week 4. The build block can split across two sittings — the in-page timer pauses and resumes. The First Public Test runs as a Canvas Discussion thread (Wed–Sun) for async students; replies due 48 h after posting.</>}
                />
              )}
            </div>

            {sections.map((s) => {
              const C = s.Cmp;
              const sc = engagement.selfChecks[s.id];
              const m = media[s.id];
              return (
                <section id={s.id} key={s.id} data-screen-label={`${s.label}`} style={main.section}>
                  {m && window.MediaSlot && (
                    <window.MediaSlot data={m} lessonKey="project-seed-v01" sectionId={s.id} />
                  )}
                  {C ? <C /> : <div style={{ padding: 80, color: 'var(--signal-red)' }}>Missing: {s.id}</div>}
                  {sc && window.SelfCheck && (
                    <window.SelfCheck data={sc} lessonKey="project-seed-v01" sectionId={s.id} />
                  )}
                </section>
              );
            })}

            {window.ReflectionJournal && (
              <window.ReflectionJournal data={engagement.reflection} lessonKey="project-seed-v01">
                {window.ExportWork && (
                  <window.ExportWork lessonKey="project-seed-v01" lessonTitle="Week 4 · Project Seed v0.1" />
                )}
              </window.ReflectionJournal>
            )}

            {window.CaptureTemplate && (
              <window.CaptureTemplate data={captureTemplate} />
            )}

            <footer style={main.foot}>
              <div style={{ color: 'var(--ink-300)', marginBottom: 18, fontFamily: 'var(--font-mono)', fontSize: 11, whiteSpace: 'pre' }} aria-hidden="true">
{`+----------------------------------------------------+
|  W04  ·  v0.1 shipped  ·  externalized  ·  yours  |
+----------------------------------------------------+`}
              </div>
              <div style={{ fontFamily: 'var(--font-display)', fontSize: 26, fontStyle: 'italic', color: 'var(--ink-500)' }}>
                You said you wanted to <span style={{ color: 'var(--crimson)' }}>build</span>. Now you have <span style={{ color: 'var(--crimson)' }}>built</span>.
              </div>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-300)', letterSpacing: '0.15em', marginTop: 28 }}>
                CSCI-Y100 · v2.0 · 2026
              </div>
            </footer>
          </main>
        </div>
      );
    }

    const topBar = {
      bar: { position: 'sticky', top: 0, zIndex: 50, display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'center', padding: '12px 32px', background: 'var(--ink-900)', color: 'var(--paper-100)', borderBottom: '3px solid var(--crimson)' },
      left: { display: 'flex', alignItems: 'center', gap: 12, justifySelf: 'start' },
      center: { justifySelf: 'center' },
      right: { display: 'flex', gap: 10, justifySelf: 'end', alignItems: 'center' },
      iuMark: { width: 26, height: 26, background: 'var(--crimson)', color: '#fff', fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 13, fontStyle: 'italic', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' },
      crumb: { fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--paper-300)', letterSpacing: '0.1em' },
      title: { fontFamily: 'var(--font-display)', fontSize: 18, fontWeight: 600, fontStyle: 'italic', color: 'var(--paper-50)' },
      chip: { fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.05em', border: '1px solid var(--paper-300)', color: 'var(--paper-100)', padding: '4px 8px', borderRadius: 3 },
    };

    const rail = {
      nav: { position: 'fixed', top: 80, left: 32, width: 220, background: 'var(--paper-100)', border: '1px solid var(--paper-200)', padding: '18px 14px 14px', borderRadius: 6, boxShadow: 'var(--shadow-paper)', zIndex: 20 },
      head: { fontFamily: 'var(--font-mono)', fontSize: 10, fontWeight: 700, color: 'var(--ink-900)', letterSpacing: '0.18em', marginBottom: 14, paddingBottom: 10, borderBottom: '2px solid var(--ink-900)' },
      list: { display: 'flex', flexDirection: 'column', gap: 2 },
      item: { display: 'grid', gridTemplateColumns: '24px 1fr auto', alignItems: 'center', gap: 8, background: 'transparent', border: 'none', cursor: 'pointer', padding: '8px 10px', borderRadius: 3, textAlign: 'left', color: 'var(--ink-700)', fontFamily: 'var(--font-body)', fontSize: 12.5 },
      itemActive: { background: 'var(--ink-900)', color: 'var(--paper-50)' },
      idx: { fontFamily: 'var(--font-mono)', fontSize: 10, opacity: 0.7 },
      lbl: { fontWeight: 600 },
      time: { fontFamily: 'var(--font-mono)', fontSize: 9.5, opacity: 0.7 },
      back: { display: 'block', marginTop: 16, paddingTop: 12, borderTop: '1px dashed var(--paper-300)', fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-500)', textDecoration: 'none', textAlign: 'center' },
    };

    const main = {
      wrap: { marginLeft: 280, padding: '0 56px 0 24px', maxWidth: 1100 },
      section: { padding: '60px 0', borderBottom: '1px solid var(--paper-200)', minHeight: 'min-content' },
      foot: { padding: '90px 0 120px', textAlign: 'center' },
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
