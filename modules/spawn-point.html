<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Week 1 · Spawn Point · CSCI-Y100</title>
  <meta name="description" content="Week 1 of CSCI-Y100: a 90-minute Spawn Point module. Roll call, cold open, capability map, equipment scavenger, prototype sprint, and project seed." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500;1,9..144,600&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../tokens.css" />

  <style>
    html, body { margin: 0; padding: 0; background: var(--paper-50); color: var(--ink-900); font-family: var(--font-body); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    :root {
      --signal-amber-text: #B8851D;
      --signal-red-text:   #B83A22;
      --signal-blue-text:  #3A5FA8;
      --signal-green-text: #3F8A56;
      --signal-purple-text: #5C418F;
    }
    .skip-link { position: absolute; left: -9999px; }
    .skip-link:focus { left: 8px; top: 8px; background: var(--ink-900); color: #fff; padding: 8px 12px; z-index: 100; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root">
    <p style="padding:32px;font:16px/1.5 system-ui,sans-serif;color:#5A523F;">Loading Week 1: Spawn Point…</p>
  </div>
  <noscript>
    <div style="max-width:640px;margin:60px auto;padding:24px 28px;background:#FBF7F0;border:2px solid #16140F;font:16px/1.55 system-ui,sans-serif;">
      <h1 style="font-family:Georgia,serif;font-style:italic;margin:0 0 10px;">JavaScript needed</h1>
      <p>This interactive module renders with React. Please enable JavaScript to use this lesson.</p>
    </div>
  </noscript>

  <script type="text/babel" src="sp-sections/00-rollcall.jsx"></script>
  <script type="text/babel" src="sp-sections/01-coldopen.jsx"></script>
  <script type="text/babel" src="sp-sections/02-spawnkit.jsx"></script>
  <script type="text/babel" src="sp-sections/03-scavenger.jsx"></script>
  <script type="text/babel" src="sp-sections/04-prototype.jsx"></script>
  <script type="text/babel" src="sp-sections/05-projectseed.jsx"></script>
  <script type="text/babel" src="sp-sections/06-takehome.jsx"></script>
  <script type="text/babel" src="async-track.jsx"></script>
  <script type="text/babel" src="engagement.jsx"></script>
  <script type="text/babel" src="media-slot.jsx"></script>
  <script type="text/babel" src="course-arc.jsx"></script>
  <script type="text/babel" src="capture-template.jsx"></script>

  <script type="text/babel">
    const sections = [
      { id: 'rollcall', label: 'Roll call',           time: '12 min', Cmp: window.SPSectionRollCall },
      { id: 'cold',     label: 'Cold open · Wk 14',   time: '6 min',  Cmp: window.SPSectionColdOpen },
      { id: 'kit',      label: 'Capability map',      time: '8 min',  Cmp: window.SPSectionSpawnKit },
      { id: 'scav',     label: 'Equipment scavenger', time: '20 min', Cmp: window.SPSectionScavenger },
      { id: 'proto',    label: 'Prototype sprint',    time: '30 min', Cmp: window.SPSectionPrototype },
      { id: 'seed',     label: 'Project seed',        time: '10 min', Cmp: window.SPSectionProjectSeed },
      { id: 'home',     label: 'Take-home',           time: '4 min',  Cmp: window.SPSectionTakeHome },
    ];

    const asyncTrack = [
      { refId: 'rollcall', label: 'Roll call', soloTime: '8 min',
        activity: 'Post a one-line intro in the Week 1 Discussion thread plus one capability you want to grow this semester. Read three classmates\' intros and reply to one.',
        deliverable: 'Canvas → Week 1 → "Roll call" Discussion',
        peerLoop: 'Reply within 48 h of your post.' },
      { refId: 'cold', label: 'Cold open · Week 14', soloTime: '5 min',
        activity: 'Watch the recorded cold-open clip (or read the 1-page text version if you prefer). Note one thing the Week 14 student wishes they\'d known in Week 1.',
        deliverable: 'Private Start Log entry — no posting required.',
        recording: 'Linked at top of Canvas → Week 1.' },
      { refId: 'kit', label: 'Capability map', soloTime: '8 min',
        activity: 'Walk the static Capability Map below. Mark three capabilities you\'ve already used and three you haven\'t. Drop the list into your Start Log.',
        deliverable: 'Start Log only — facilitator spot-checks during 1:1s.' },
      { refId: 'scav', label: 'Equipment scavenger', soloTime: '25 min',
        activity: 'Visit one Luddy or Library space (Maker Lab, Creator Commons, Equipment Catalog, etc.). Photograph one piece of equipment you didn\'t know existed and post it with a one-sentence caption.',
        deliverable: 'Canvas → Week 1 → "Scavenger finds" Discussion',
        peerLoop: 'React or comment on at least two finds before Sunday.' },
      { refId: 'proto', label: 'Prototype sprint', soloTime: '35 min',
        activity: 'Run the Prototype Sprint widget below solo. Phases auto-time. When done, take a screenshot of the final canvas.',
        deliverable: 'Canvas → Week 1 → "Prototype shipped" assignment (upload screenshot).',
        peerLoop: 'Optional: post the screenshot in the Discussion for reactions.' },
      { refId: 'seed', label: 'Project seed', soloTime: '12 min',
        activity: 'Fill in the Project Seed form below. Post the seed (one paragraph) so a classmate can react before next week\'s working session.',
        deliverable: 'Canvas → Week 1 → "Project seed" Discussion',
        peerLoop: 'Reply with one question or one "I\'d co-build that" by Sunday night.' },
      { refId: 'home', label: 'Take-home', soloTime: '4 min',
        activity: 'Same as the in-class take-home: confirm the three deliverables are submitted in Canvas before Sunday 11:59 pm.',
        deliverable: 'All three Week 1 items posted/uploaded in Canvas.' },
    ];

    const engagement = {
      selfChecks: {
        rollcall: {
          question: 'Name two capabilities you want to grow this semester — one technical, one not.',
          hint: 'Look at the Capability Map and pick what feels most useful in 14 weeks, not what feels easiest right now.',
          answer: 'No single right answer. Strong responses pair a concrete technical skill (e.g., "ship a Python script someone else can run") with a non-technical one (e.g., "ask for help before I\'m drowning").'
        },
        cold: {
          question: 'What does the Week-14 student wish their Week-1 self had done differently?',
          hint: 'Re-watch / re-read the cold open if you skipped it.',
          answer: 'The recurring answer: start logging earlier, ship rough things sooner, and ask for help on Day 3 instead of Day 30.'
        },
        kit: {
          question: 'In your own words: what\'s the difference between a tool and a capability?',
          hint: 'A tool is what you press; a capability is what you can pull off because you know how to use it.',
          answer: 'A tool is a noun (Figma, Python, the laser cutter). A capability is a verb you can perform with it (prototype an interface, parse a CSV, cut a sign). The capability map is verbs; the toolbox is nouns.'
        },
        scav: {
          question: 'Which Luddy/Library space felt most useful for what you\'re actually trying to learn this semester?',
          hint: 'There\'s no wrong answer — but be specific. "The Maker Lab because the soldering iron is right there" beats "the library because it has stuff."',
          answer: 'Strong responses name a space + a specific piece of equipment + a concrete use ("Creator Commons, the Cricut, for Week 6 prototype packaging").'
        },
        proto: {
          question: 'When did your prototype get worse before it got better — and why?',
          hint: 'Almost every sprint has a moment where you cut something good to fit the constraint.',
          answer: 'Common pattern: you over-built early, then had to strip features to fit the time-box. The "worse" version is usually closer to a real first ship.'
        },
        seed: {
          question: 'What\'s the smallest version of your project seed you could ship by Week 4?',
          hint: 'The trick is "smallest that someone else could see and react to" — not "smallest you can imagine."',
          answer: 'Should fit on a sticky note, have one user (even if it\'s you), and be testable in under 5 minutes.'
        },
        home: {
          question: 'Which of the three deliverables is most likely to slip — and what will you do Friday to keep it from slipping?',
          hint: 'Pre-mortems beat post-mortems. Name the failure mode now, then a counter-move.',
        },
      },
      reflection: {
        title: 'Spawn Point reflection',
        intro: 'Three short prompts. Auto-saves as you type. Hit "Copy for Canvas" when you\'re done and paste into the Week 1 reflection assignment.',
        prompts: [
          'What was the single most useful thing from Spawn Point — the one thing you\'ll actually carry into next week?',
          'Where did you get stuck or feel out of place, and what would unstick you?',
          'What\'s one capability you want to be visibly better at by Week 4?',
        ],
      },
    };

    const captureTemplate = {
      title: 'Spawn Point · Obsidian capture',
      target: 'Weeks/W01-spawn-point.md',
      intro: 'Drop this template into your vault. The headings already match the lesson — fill them in as the week unfolds. Wikilinks like [[Project/seed]] connect this note to the rest of your vault as it grows.',
      markdown: `---
type: lesson
week: 01
lesson: Spawn Point
date:${' '}
status: open
---

# Spawn Point — Week 1

## Anchor question
What can the toolbox actually *do*?

## Capabilities I want to grow this semester
- [ ] one technical:${' '}
- [ ] one non-technical:${' '}

## Project seed → [[Project/seed]]
- WHO it's for:${' '}
- WHAT it does:${' '}
- VERBS it needs:${' '}
- v0.1 by Week 4 looks like:${' '}

## Equipment scavenger find
- Space (Creator Commons / Maker Lab / etc.):${' '}
- Equipment:${' '}
- One thing I'd make with it:${' '}

## Take-home check
- [ ] Capability map screenshot in Canvas
- [ ] Prototype shipped (cardboard photo)
- [ ] Project seed posted to Discussion

## Reflection
> Most useful thing from this lesson:

> Where I got stuck:

> Capability I want to be visibly better at by Week 4:

## Links / sources
-${' '}
`,
    };

    /* Media slots — drop a \`src\` (YouTube/Vimeo/Panopto embed URL) when the
       recording is ready and switch type to 'video'. Transcripts are the
       async fallback referenced in the Async Track copy. */
    const media = {
      cold: {
        type: 'placeholder',
        label: 'cold-open clip',
        caption: 'Cold open · a Week 14 student looks back',
        src: '',
        transcript:
`Skip ahead 14 weeks. You're three days from the end of CSCI-Y100 and three students just gave their final design-thinking demo back-to-back.

The first one was magnetic — clearly going to take a job in the field. The second one was the median, fine but not memorable. The third one nearly didn't make it to Week 6, then something flipped, and they shipped a project that the room reacted to.

What separated them wasn't talent. It wasn't even hours. It was how soon they figured out what the toolbox could actually DO. The first student had a working prototype on Day 4 of Week 1 — a bad one, but a real one. The second one waited until Week 5 to ship anything beyond a sketch. The third spent Weeks 1–4 stuck, then in Week 5 they made one ugly thing and the lights came on.

The capability map is the same map for all three. The toolbox is the same toolbox. The only difference was when they put their hands on it.

So: today's spawn point is the same for you. The only choice you've actually got is when you start using it. The Week-14 student in the back row is rooting for you to start sooner.`
      },
    };

    function App() {
      const [active, setActive] = React.useState('rollcall');

      React.useEffect(() => {
        const opts = { rootMargin: '-30% 0px -55% 0px', threshold: 0 };
        const obs = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); });
        }, opts);
        sections.forEach(s => {
          const el = document.getElementById(s.id);
          if (el) obs.observe(el);
        });
        return () => obs.disconnect();
      }, []);

      const goto = (id) => {
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' });
      };

      return (
        <div style={{ position: 'relative' }}>
          <header style={topBar.bar}>
            <div style={topBar.left}>
              <span style={topBar.iuMark}>IU</span>
              <span style={topBar.crumb}>CSCI-Y100 · WEEK 01</span>
            </div>
            <div style={topBar.center}>
              <span style={topBar.title}>Spawn Point · the toolbox + your first prototype</span>
            </div>
            <div style={topBar.right}>
              <span style={topBar.chip}>⏱ 90 min</span>
              <span style={{ ...topBar.chip, background: 'var(--signal-green)', color: '#fff', borderColor: 'var(--signal-green)' }}>3 deliverables</span>
              <button type="button" className="lesson-print-btn" onClick={() => window.print()}>Print worksheet</button>
            </div>
          </header>

          <nav style={rail.nav} aria-label="Module sections">
            <div style={rail.head}>CLASS FLOW</div>
            <div style={rail.list}>
              {sections.map((s, i) => (
                <button
                  key={s.id}
                  onClick={() => goto(s.id)}
                  aria-current={active === s.id ? 'location' : undefined}
                  aria-label={`Section ${i+1}: ${s.label}, ${s.time}`}
                  style={{
                    ...rail.item,
                    ...(active === s.id ? rail.itemActive : {}),
                  }}
                >
                  <span style={rail.idx}>{i.toString().padStart(2,'0')}</span>
                  <span style={rail.lbl}>{s.label}</span>
                  <span style={rail.time}>{s.time}</span>
                </button>
              ))}
            </div>
            <a href="../index.html" style={rail.back}>← Back to canvas</a>
          </nav>

          <main id="main-content" style={main.wrap}>
            <div style={{ paddingTop: 28 }}>
              {window.CourseArc && (
                <window.CourseArc currentKey="spawn-point" />
              )}
              {window.AsyncTrack && (
                <window.AsyncTrack
                  data={asyncTrack}
                  lessonKey="spawn-point"
                  totalTime="~95 min"
                  canvasHub="Canvas → Week 1 module"
                  intro={<><strong>Heads up:</strong> this is the asynchronous mirror of Week 1. Same five Big Ideas, same three deliverables, no in-room time. Each step below pairs with an in-class section so you can move between modes if your week shifts.</>}
                />
              )}
            </div>
            {sections.map((s) => {
              const C = s.Cmp;
              const sc = engagement.selfChecks[s.id];
              const m = media[s.id];
              return (
                <section id={s.id} key={s.id} data-screen-label={`${s.label}`} style={main.section}>
                  {m && window.MediaSlot && (
                    <window.MediaSlot data={m} lessonKey="spawn-point" sectionId={s.id} />
                  )}
                  {C ? <C /> : <div style={{ padding: 80, color: 'var(--signal-red)' }}>Missing: {s.id}</div>}
                  {sc && window.SelfCheck && (
                    <window.SelfCheck data={sc} lessonKey="spawn-point" sectionId={s.id} />
                  )}
                </section>
              );
            })}

            {window.ReflectionJournal && (
              <window.ReflectionJournal data={engagement.reflection} lessonKey="spawn-point">
                {window.ExportWork && (
                  <window.ExportWork lessonKey="spawn-point" lessonTitle="Week 1 · Spawn Point" />
                )}
              </window.ReflectionJournal>
            )}

            {window.CaptureTemplate && (
              <window.CaptureTemplate data={captureTemplate} />
            )}

            <footer style={main.foot}>
              <div style={{ color: 'var(--ink-300)', marginBottom: 18, fontFamily: 'var(--font-mono)', fontSize: 11, whiteSpace: 'pre' }} aria-hidden="true">
{`+----------------------------------------------+
|  SPAWNED  ·  toolbox open · prototype shipped |
+----------------------------------------------+`}
              </div>
              <div style={{ fontFamily: 'var(--font-display)', fontSize: 26, fontStyle: 'italic', color: 'var(--ink-500)' }}>
                You know the <span style={{ color: 'var(--crimson)' }}>verbs</span>. You've made the <span style={{ color: 'var(--crimson)' }}>thing</span>. Now go build for 14 weeks.
              </div>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-300)', letterSpacing: '0.15em', marginTop: 28 }}>
                CSCI-Y100 · v2.0 · 2026
              </div>
            </footer>
          </main>
        </div>
      );
    }

    const topBar = {
      bar: { position: 'sticky', top: 0, zIndex: 50, display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'center', padding: '12px 32px', background: 'var(--ink-900)', color: 'var(--paper-100)', borderBottom: '3px solid var(--crimson)' },
      left: { display: 'flex', alignItems: 'center', gap: 12, justifySelf: 'start' },
      center: { justifySelf: 'center' },
      right: { display: 'flex', gap: 10, justifySelf: 'end' },
      iuMark: { width: 26, height: 26, background: 'var(--crimson)', color: '#fff', fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 13, fontStyle: 'italic', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' },
      crumb: { fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--paper-300)', letterSpacing: '0.1em' },
      title: { fontFamily: 'var(--font-display)', fontSize: 18, fontWeight: 600, fontStyle: 'italic', color: 'var(--paper-50)' },
      chip: { fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.05em', border: '1px solid var(--paper-300)', color: 'var(--paper-100)', padding: '4px 8px', borderRadius: 3 },
    };

    const rail = {
      nav: { position: 'fixed', top: 80, left: 32, width: 220, background: 'var(--paper-100)', border: '1px solid var(--paper-200)', padding: '18px 14px 14px', borderRadius: 6, boxShadow: 'var(--shadow-paper)', zIndex: 20 },
      head: { fontFamily: 'var(--font-mono)', fontSize: 10, fontWeight: 700, color: 'var(--ink-900)', letterSpacing: '0.18em', marginBottom: 14, paddingBottom: 10, borderBottom: '2px solid var(--ink-900)' },
      list: { display: 'flex', flexDirection: 'column', gap: 2 },
      item: { display: 'grid', gridTemplateColumns: '24px 1fr auto', alignItems: 'center', gap: 8, background: 'transparent', border: 'none', cursor: 'pointer', padding: '8px 10px', borderRadius: 3, textAlign: 'left', color: 'var(--ink-700)', fontFamily: 'var(--font-body)', fontSize: 12.5 },
      itemActive: { background: 'var(--ink-900)', color: 'var(--paper-50)' },
      idx: { fontFamily: 'var(--font-mono)', fontSize: 10, opacity: 0.7 },
      lbl: { fontWeight: 600 },
      time: { fontFamily: 'var(--font-mono)', fontSize: 9.5, opacity: 0.7 },
      back: { display: 'block', marginTop: 16, paddingTop: 12, borderTop: '1px dashed var(--paper-300)', fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-500)', textDecoration: 'none', textAlign: 'center' },
    };

    const main = {
      wrap: { marginLeft: 280, padding: '0 56px 0 24px', maxWidth: 1100 },
      section: { padding: '60px 0', borderBottom: '1px solid var(--paper-200)', minHeight: 'min-content' },
      foot: { padding: '90px 0 120px', textAlign: 'center' },
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
