  <script type="text/babel">
    const sections = [
      { id: 'avoid',   label: 'Avoidance Wall',   time: '10 min', Cmp: window.ProcSectionAvoidance },
      { id: 'cold',    label: 'Cold open',        time: '5 min',  Cmp: window.ProcSectionColdOpen },

    const asyncTrack = [
      { refId: 'avoid', label: 'Avoidance Wall', soloTime: '10 min',
        activity: 'Read the Avoidance Wall page and post your top three avoidance items via the anonymous async form. The shared wall populates from everyone\'s submissions — you\'ll see the patterns immediately.',
        deliverable: 'Canvas → Week 7 → "Avoidance Wall" anonymous form (no name attached).' },
      { refId: 'cold', label: 'Cold open', soloTime: '4 min',
        activity: 'Watch the recorded cold open or read the 1-page text version. Note one task you\'ve been avoiding for more than a week.',
        deliverable: 'Private — no posting required.',
        recording: 'Linked at top of Canvas → Week 7.' },
      { refId: 'trig', label: 'The 4 Triggers', soloTime: '8 min',
        activity: 'Read The 4 Triggers below (boring, frustrating, ambiguous, scary). Identify your dominant trigger this semester and add it to your Start Log.',
        deliverable: 'Start Log entry — facilitator spot-checks during 1:1s.' },
      { refId: 'bad', label: 'Start Bad on Purpose', soloTime: '15 min',
        activity: 'Pick the avoided task from the cold open. Set a 10-minute timer and do the worst possible version on purpose. Screenshot the bad start.',
        deliverable: 'Canvas → Week 7 → "Bad start" Discussion (post screenshot + 1 sentence).',
        peerLoop: 'Reply to two classmates with one solidarity comment each by Sunday.' },
      { refId: 'autopsy', label: 'Procrastination Autopsy', soloTime: '30 min',
        activity: 'Run the Procrastination Autopsy as a self-guided journal. The form auto-saves to your browser; you can leave and return. When done, export or screenshot the completed autopsy.',
        deliverable: 'Canvas → Week 7 → "Autopsy" assignment (private to facilitator).' },
      { refId: 'stack', label: 'Motivation Stack', soloTime: '22 min',
        activity: 'Build your Motivation Stack solo using the in-page widget. Aim for three layers: one external accountability, one environmental nudge, one tiny ritual.',

        peerLoop: 'Steal one layer from a classmate by Sunday and tell them which.' },
      { refId: 'home', label: 'Take-home', soloTime: '10 min',
        activity: 'Same as the in-class take-home: pick one autopsy item to attempt this week using your new motivation stack. Log what worked.',
        deliverable: 'Canvas → Week 7 → "Honest Start log" entry (one paragraph by next Sunday).' },
    ];

    const engagement = {
      selfChecks: {
        avoid: {
          question: 'What pattern shows up most on the wall — across everyone\'s avoidance items?',
          hint: 'Look for the trigger underneath the surface task. "Math homework" and "writing the email" both often map to the same trigger.',
          answer: 'Most years the wall clusters around two triggers: ambiguity (don\'t know where to start) and fear (don\'t want to find out it\'s bad). Boring and frustrating show up too, but less than students predict.'
        },
        cold: {
          question: 'What task have you been avoiding for more than a week — and what would the smallest possible start look like?',
          hint: '"Smallest start" means under 2 minutes. Open the doc. Title the email. Drop the first bullet.',
          answer: 'Strong responses pair a real avoided task with a sub-2-minute first move. Vague responses ("just start it") usually predict more avoidance.'
        },
        trig: {
          question: 'Which of the four triggers (boring, frustrating, ambiguous, scary) is your dominant one this semester — and how do you know?',
          hint: 'Look at what you\'ve actually been avoiding. The pattern reveals the trigger.',
          answer: 'Most CS students score highest on "ambiguous" or "scary" — they avoid tasks where they don\'t know if their work is good or where the spec isn\'t crisp. "Boring" is more common in non-major courses.'
        },
        bad: {
          question: 'What did "bad on purpose" actually feel like — and what did you notice once the bar was that low?',
          hint: 'The point isn\'t that the bad version was secretly good. The point is what happened to your brain when the bar dropped.',
          answer: 'Most students report that once the bar drops to "bad on purpose," the resistance falls off and they accidentally produce a usable first draft. The bad version is the unblocker, not the goal.'
        },
        autopsy: {
          question: 'Looking at your autopsy: was it actually about the task, or about something else?',
          hint: 'Almost no procrastination is about the task itself. It\'s usually about identity, fear, or sleep.',
          answer: 'Common pattern: the surface task ("write the lab report") sits on top of an identity stake ("if this is bad, maybe I don\'t belong here"). The autopsy is most useful when you can name the underneath thing.'
        },
        stack: {
          question: 'Which layer of your stack will fail first — and what\'s your backup?',
          hint: 'External accountability is usually the most fragile (the friend gets sick). Environmental nudges are the most durable.',
          answer: 'Strong stacks have at least one durable layer (an environment change you don\'t have to remember) and at least one social layer (a person who notices). Pure willpower stacks fail fast.'
        },
        home: {
          question: 'Which autopsy item are you actually going to attempt this week — and which trigger are you bracing for?',
          hint: 'Name the task and the trigger. "Lab report (ambiguous)" beats "do my homework."',
        },
      },
      reflection: {
        title: 'Honest Start reflection',
        intro: 'Three short prompts. Auto-saves as you type. Hit "Copy for Canvas" when you\'re done and paste into the Week 7 reflection assignment.',
        prompts: [
          'What\'s underneath the task you\'ve been avoiding most — what is it really about?',
          'Of everything from this lesson, what\'s the one move you\'ll actually try this week?',
          'When you procrastinate next, what\'s the new self-talk you want to use instead of the old one?',
        ],
      },
    };

    const captureTemplate = {
      title: 'Honest Start · Obsidian capture',
      target: 'Reflections/W07-honest-start.md',
      intro: 'Drop this into your vault. The autopsy section is private to you — write it for yourself, not for the facilitator. The motivation stack is the artifact you reuse all semester whenever you hit avoidance.',
      markdown: `---
type: lesson
week: 07
lesson: Honest Start
date:${' '}
status: open
trigger:${' '}
---

# Honest Start — Week 7

## Anchor question
What's underneath my avoidance?

## Avoided task (from cold open)
- Task:${' '}
- Avoidance length:${' '}days
- Story I've been telling myself about why:${' '}

## Dominant trigger
- [ ] Boring
- [ ] Frustrating
- [ ] Ambiguous
- [ ] Scary

## Bad-on-purpose first start
- Date / time:${' '}
- What I produced (the bad version):${' '}
- What changed in my head once the bar dropped:${' '}

## Procrastination autopsy
- Surface task:${' '}
- Underneath (identity / fear / sleep / boundary / etc.):${' '}
- The thing I was actually protecting:${' '}

## Motivation stack · for this kind of avoidance
1. **External accountability:**${' '}
2. **Environmental nudge:**${' '}
3. **Tiny ritual:**${' '}

## Reflection
> What's underneath the task I've been avoiding most?

> The one move from this lesson I'll actually try this week:

> When I procrastinate next, my new self-talk:

## Links / related autopsies
- [[Reflections/...]]
`,
    };

    const media = {
      cold: {
        type: 'placeholder',
        label: 'cold-open clip',
        caption: 'Cold open · the task you\'ve been avoiding',
        src: '',
        transcript:
`There is a task in your life right now that you have been avoiding for more than a week. You know which one. You're already thinking about it. That's the one.

The story you've been telling yourself about why you're avoiding it is: 'I just need to be more disciplined,' or 'I'll do it tomorrow when I have more energy,' or 'I'm not ready,' or 'It's not actually due yet.' Pick yours. Whatever the story is, it has the same shape — it makes the avoidance about the future, when you'll have something you don't have today (motivation, time, courage, clarity). And the future you that has those things never arrives.

Procrastination is not a discipline problem. We're going to take that off the table in the first ten minutes today. Procrastination is a trigger problem — there's a specific feeling the task creates in you (boring, frustrating, ambiguous, scary), and you avoid the feeling by avoiding the task. This is unconscious. You don't decide to procrastinate. Your brain runs a 'cost vs. reward' calculation faster than you can override it, and avoidance wins.

The good news: triggers are nameable. Once you know which one is dominant for the avoided task, the move is different — you don't fight harder, you change the trigger. Boring tasks need a soundtrack or a partner. Frustrating tasks need a smaller next step. Ambiguous tasks need a fake spec. Scary tasks need a bad-on-purpose first draft so the bar is below your fear.

Today we're going to do the autopsy on one specific avoided task — the one you're already thinking about. Not the abstract version. The real one. By the end of the lesson you will have started it. Not finished it. Started. That's the win.`
      },
    };

    function App() {
      const [active, setActive] = React.useState('avoid');

      React.useEffect(() => {
        const opts = { rootMargin: '-30% 0px -55% 0px', threshold: 0 };

          entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); });
        }, opts);
        sections.forEach(s => {
          const el = document.getElementById(s.id);
          if (el) obs.observe(el);
        });
        return () => obs.disconnect();
      }, []);

      const goto = (id) => {
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' });
      };

      return (
        <div style={{ position: 'relative' }}>
          <header style={topBar.bar}>
            <div style={topBar.left}>
              <span style={topBar.iuMark}>IU</span>
              <span style={topBar.crumb}>CSCI-Y100 · WEEK 07</span>
            </div>
            <div style={topBar.center}>
              <span style={topBar.title}>The Honest Start · Motivation & Procrastination</span>
            </div>
            <div style={topBar.right}>
              <span style={topBar.chip}>⏱ 90 min</span>
              <span style={{ ...topBar.chip, background: 'var(--signal-green)', color: '#fff', borderColor: 'var(--signal-green)' }}>2 deliverables</span>
              <button type="button" className="lesson-print-btn" onClick={() => window.print()}>Print worksheet</button>
            </div>
          </header>

          <nav style={rail.nav} aria-label="Module sections">
            <div style={rail.head}>CLASS FLOW</div>
            <div style={rail.list}>
              {sections.map((s, i) => (
                <button
                  key={s.id}
                  onClick={() => goto(s.id)}
                  aria-current={active === s.id ? 'location' : undefined}
                  aria-label={`Section ${i+1}: ${s.label}, ${s.time}`}
                  style={{
                    ...rail.item,
                    ...(active === s.id ? rail.itemActive : {}),
                  }}
                >
                  <span style={rail.idx}>{i.toString().padStart(2,'0')}</span>
                  <span style={rail.lbl}>{s.label}</span>
                  <span style={rail.time}>{s.time}</span>
                </button>
              ))}
            </div>
            <a href="../index.html" style={rail.back}>← Back to canvas</a>
          </nav>

          <main id="main-content" style={main.wrap}>
            <div style={{ paddingTop: 28 }}>
              {window.CourseArc && (
                <window.CourseArc currentKey="honest-start" />
              )}
              {window.AsyncTrack && (
                <window.AsyncTrack
                  data={asyncTrack}
                  lessonKey="honest-start"
                  totalTime="~99 min"
                  canvasHub="Canvas → Week 7 module"
                  intro={<><strong>Heads up:</strong> async mirror of Week 7. The Avoidance Wall and Autopsy forms auto-save to your browser, so you can do this in three short sittings. The Bad Start screenshot is shared publicly; the Autopsy stays private.</>}
                />
              )}
            </div>
            {sections.map((s) => {
              const C = s.Cmp;
              const sc = engagement.selfChecks[s.id];
              const m = media[s.id];
              return (
                <section id={s.id} key={s.id} data-screen-label={`${s.label}`} style={main.section}>
                  {m && window.MediaSlot && (
                    <window.MediaSlot data={m} lessonKey="honest-start" sectionId={s.id} />
                  )}
                  {C ? <C /> : <div style={{ padding: 80, color: 'var(--signal-red)' }}>Missing: {s.id}</div>}
                  {sc && window.SelfCheck && (
                    <window.SelfCheck data={sc} lessonKey="honest-start" sectionId={s.id} />
                  )}
                </section>
              );
            })}

            {window.ReflectionJournal && (
              <window.ReflectionJournal data={engagement.reflection} lessonKey="honest-start">
                {window.ExportWork && (
                  <window.ExportWork lessonKey="honest-start" lessonTitle="Week 7 · The Honest Start" />
                )}
              </window.ReflectionJournal>
            )}

            {window.CaptureTemplate && (
              <window.CaptureTemplate data={captureTemplate} />
            )}

            <footer style={main.foot}>
              <div style={{ color: 'var(--ink-300)', marginBottom: 18, fontFamily: 'var(--font-mono)', fontSize: 11, whiteSpace: 'pre' }} aria-hidden="true">
{`+--------------------------------------------+
|  END OF MODULE  ·  start before you're ready|
+--------------------------------------------+`}
              </div>
              <div style={{ fontFamily: 'var(--font-display)', fontSize: 26, fontStyle: 'italic', color: 'var(--ink-500)' }}>
                Feeling better isn't the goal. <span style={{ color: 'var(--crimson)' }}>Doing the thing</span> is.
              </div>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-300)', letterSpacing: '0.15em', marginTop: 28 }}>
                CSCI-Y100 · v2.0 · 2026
              </div>
            </footer>
          </main>
        </div>
      );
    }

    const topBar = {
      bar: {
        position: 'sticky', top: 0, zIndex: 50,
        display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'center',
        padding: '12px 32px',
        background: 'var(--ink-900)', color: 'var(--paper-100)',
        borderBottom: '3px solid var(--crimson)',

      left: { display: 'flex', alignItems: 'center', gap: 12, justifySelf: 'start' },
      center: { justifySelf: 'center' },
      right: { display: 'flex', gap: 10, justifySelf: 'end' },
      iuMark: {
        width: 26, height: 26, background: 'var(--crimson)', color: '#fff',

      title: { fontFamily: 'var(--font-display)', fontSize: 18, fontWeight: 600, fontStyle: 'italic', color: 'var(--paper-50)' },
      chip: {
        fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.05em',
        border: '1px solid var(--paper-300)', color: 'var(--paper-100)',

    };

    const rail = {
      nav: {
        position: 'fixed', top: 80, left: 32, width: 220,
        background: 'var(--paper-100)', border: '1px solid var(--paper-200)',

        textDecoration: 'none', textAlign: 'center',

    };

    const main = {
      wrap: { marginLeft: 280, padding: '0 56px 0 24px', maxWidth: 1100 },
      section: { padding: '60px 0', borderBottom: '1px solid var(--paper-200)', minHeight: 'min-content' },
      foot: { padding: '90px 0 120px', textAlign: 'center' },
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
