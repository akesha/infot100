    const sections = [

      { id: 'coldopen',  label: 'Cold open',      time: '5 min',  Cmp: window.AISectionColdOpen },
      { id: 'loop',      label: 'The Co-pilot Loop', time: '8 min', Cmp: window.AISectionLoop },

    const asyncTrack = [
      { refId: 'trustfall', label: 'Trust Fall', soloTime: '10 min',
        activity: 'Read the Trust Fall scenarios below and answer the three reflection questions in Canvas. There are no wrong answers — your stance now is the baseline you\'ll compare to in Week 14.',

      { refId: 'coldopen', label: 'Cold open', soloTime: '4 min',
        activity: 'Watch the recorded cold open or read the 1-page text version. Note one assumption about AI you\'re bringing into the week.',
        deliverable: 'Private — no posting required.',
        recording: 'Linked at top of Canvas → Week 6.' },
      { refId: 'loop', label: 'The Co-pilot Loop', soloTime: '6 min',
        activity: 'Read The Co-pilot Loop overview (frame → prompt → audit → revise). Skim once; you\'ll execute it in the Prompt Lab next.',
        deliverable: 'No deliverable for this step.' },
      { refId: 'race', label: 'Race the AIs', soloTime: '15 min',
        activity: 'Run the Race the AIs scenario solo using the in-page widget. Pick one starter prompt; run it through two free models (e.g., ChatGPT free + Claude free). Note which one won and why.',
        deliverable: 'Canvas → Week 6 → "Race log" entry (one paragraph + a screenshot).' },
      { refId: 'lab', label: 'Prompt Lab', soloTime: '30 min',
        activity: 'Walk the Prompt Lab below at your own pace. The widget guides four prompt patterns (role / context / constraint / iterate). Save your top three prompts and the outputs they produced.',
        deliverable: 'Canvas → Week 6 → "Prompt Lab" Discussion (post your top 3 prompts + outputs).',
        peerLoop: 'React to two classmates\' posts before Sunday — call out one prompt move you\'ll steal.' },
      { refId: 'pair', label: 'Pair audit (async)', soloTime: '20 min posting + 15 min replying',
        activity: 'Async pair audit: post your prompt log to the dedicated Canvas thread by Wednesday. The facilitator pairs students by Thursday; you\'ll get a partner\'s post to audit. Use the audit checklist (linked in Canvas) — name one strength and one prompt you\'d rewrite.',
        deliverable: 'Canvas → Week 6 → "Pair audit" thread — post by Wed, reply to your pair by Sun.',
        peerLoop: 'Pairing is automatic; the facilitator posts pairs Thursday morning.' },
      { refId: 'home', label: 'Take-home · Prompt Journal', soloTime: '10 min/day for 5 days',
        activity: 'Five-day Prompt Journal — same as the in-class take-home. One prompt per weekday, with what you tried, what shipped, and what you\'d change.',
        deliverable: 'Canvas → Week 6 → "Prompt Journal" assignment (single PDF or Doc).' },
    ];

    const engagement = {
      selfChecks: {
        trustfall: {
          question: 'On a scale of 0–10, how much do you currently trust AI to do your thinking for you in this course?',
          hint: 'Be honest with yourself — there\'s no right number, but the number itself matters in Week 14.',
          answer: 'Most students start between 3 and 7. By Week 14, the number usually moves — sometimes up, sometimes down. The point of recording it now is to have a baseline to compare against.'
        },
        coldopen: {
          question: 'Name one assumption about AI you\'re bringing into this week — and one you\'re willing to test.',
          hint: 'Common assumptions: "it\'s always confidently wrong," "it can\'t cite sources," "it\'ll do my homework for me."',
          answer: 'Strong responses pair a specific assumption ("it can\'t handle math") with a specific test ("I\'ll try it on the linear-algebra HW Wednesday"). Vague responses get vague tests.'
        },
        loop: {
          question: 'In one sentence each: frame, prompt, audit, revise. What does each step actually do?',
          hint: 'They\'re a loop, not a list — you can re-enter at any step.',
          answer: 'Frame: state what you\'re actually trying to produce, in your own words. Prompt: ask the model with the constraints baked in. Audit: read the output skeptically — what\'s wrong, what\'s missing? Revise: feed the audit back as the next prompt. Repeat until the output is actually useful.'
        },
        race: {
          question: 'Which model produced output you\'d actually use, and what did the loser get wrong?',
          hint: 'Model strengths shift constantly — naming the failure mode is more durable than the winner.',
          answer: 'Strong responses name the failure mode specifically (e.g., "Claude over-hedged the answer," "ChatGPT made up a citation"). The "winner" today might lose tomorrow; the failure mode is what to watch for.'
        },
        lab: {
          question: 'In your Prompt Lab outputs, did the model cite anything — and when you looked the citation up in an IU library database, did it actually exist?',
          hint: 'Hallucinated citations look like real citations: plausible authors, plausible journal names, even plausible page numbers. Check IU\'s database list (bookmarked in W3 Setup Quest). Google alone is not enough — many fake citations appear in Google results too.',
          answer: 'Strong responses caught at least one citation that didn\'t exist, or existed with wrong details (wrong author, wrong year, wrong journal). The audit move is load-bearing for academic work — without it, AI-generated text fails the moment a TA or grader spot-checks a single source.'
        },
        pair: {
          question: 'In your partner\'s prompt log, what\'s one move you\'ll steal — and one you\'d rewrite?',
          hint: 'Be specific. "I liked their stuff" is not the answer; "I\'ll start using their constraint pattern" is.',
          answer: 'Strong audits name a specific prompt pattern (e.g., "their habit of stating the audience before the task") and a specific failure mode (e.g., "they ask three questions in one prompt, the model only answers one").'
        },
        home: {
          question: 'What\'s the one prompt move from this week you\'ll commit to using on next week\'s actual coursework?',
          hint: 'Pick one. Two is too many. One you\'ll actually do is better than five you won\'t.',
        },
      },
      reflection: {
        title: 'AI Co-Pilot Camp reflection',
        intro: 'Three short prompts. Auto-saves as you type. Hit "Copy for Canvas" when you\'re done and paste into the Week 6 reflection assignment.',
        prompts: [
          'Where did AI surprise you this week — for better or worse?',
          'What\'s a task in your courseload right now where AI would actually save you time, and what\'s the prompt you\'d open with?',
          'After today, where does your trust dial sit (0–10) and why did it move?',
        ],
      },
    };

    const captureTemplate = {
      title: 'AI Co-Pilot Camp · Obsidian capture',
      target: 'Weeks/W06-ai-copilot-camp.md',
      intro: 'Drop this into your vault. The Citation audit section threads the IU library: when AI gives you a source, verify it in an IU database before you trust it. If the citation is fake, the audit catches the failure mode that ruins academic work.',
      markdown: `---
type: lesson
week: 06
lesson: AI Co-Pilot Camp
date:${' '}
status: open
trust_dial_today:${' '}
---

# AI Co-Pilot Camp — Week 6

## Anchor question
Is AI an oracle or a collaborator?

## Trust dial (0–10)
Today: ___
*(Re-record at end of W8.)*

## Race the AIs · winner + failure mode

## Top 3 prompt patterns I'll keep

2. (constraint):${' '}
3. (iterate):${' '}

## Citation audit · IU library check

|  |  | Y / N |  |
|  |  | Y / N |  |

> Notes on the audit: hallucinated citations look like real citations. Use IU's database list (linked in W3) — Google alone is not enough.

## Pair audit · partner's log
- One prompt move I'll steal:${' '}
- One prompt I'd rewrite:${' '}

## Reflection
> Where did AI surprise me this week — for better or worse?

> A task in my courseload right now where AI would actually save time, and the prompt I'd open with:

> Why did my trust dial move (or not)?

## Links / sources
-${' '}
`,
    };

    const media = {
      coldopen: {
        type: 'placeholder',
        label: 'cold-open clip',
        caption: 'Cold open · the trust fall',
        src: '',
        transcript:
`There's a story you've been told about AI in school, and you're maybe halfway believing it. The story goes: using it is cheating, or it's not really learning, or the smart students don't need it, or — depending on who's telling it — it's the only future and you're behind if you're not all-in. Pick your camp.

We're not picking a camp today. The first thing we're doing this week is the Trust Fall: a sliding scale, 0 to 10, on how much you trust AI to think for you in this course. Whatever number you write down right now is fine. The point is the number, on Day 1, with no agenda. We'll come back to it in Week 14 and see if it moved.

Here's the cold open. You've been using AI for one of three reasons: to skip a thing, to scaffold a thing, or to test what you already think. Skip is the failure mode — the homework gets done, the learning doesn't. Scaffold is what we're going to practice this week — using AI to break into a problem you couldn't crack alone, then taking over. Test is the move you'll grow into — using AI to pressure-test your own answer.

The four moves we'll practice today are not 'prompt engineering tips.' They're an actual loop: frame, prompt, audit, revise. Frame is you, in your words, saying what you're trying to make. Prompt is asking. Audit is reading the output skeptically — which most students skip. Revise is using what you learned to ask again. Most of the failure modes you've seen with AI come from skipping audit.

The thing we're trying to avoid this week is exactly two outcomes: (1) you leave thinking AI is magic and stop thinking critically; (2) you leave thinking AI is useless and never use it on the boring scaffolding tasks where it actually saves your week. Both are wrong. The middle is where we're going.`
      },
    };

    function App() {
      const [active, setActive] = React.useState('trustfall');

      React.useEffect(() => {
        const opts = { rootMargin: '-30% 0px -55% 0px', threshold: 0 };

          entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); });
        }, opts);
        sections.forEach(s => {
          const el = document.getElementById(s.id);
          if (el) obs.observe(el);
        });
        return () => obs.disconnect();
      }, []);

      const goto = (id) => {
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' });
      };

      return (
        <div style={{ position: 'relative' }}>
          <header style={topBar.bar}>
            <div style={topBar.left}>
              <span style={topBar.iuMark}>IU</span>
              <span style={topBar.crumb}>INFO-T 100 · WEEK 06</span>
            </div>
            <div style={topBar.center}>
              <span style={topBar.title}>AI Co-Pilot Camp</span>
            </div>
            <div style={topBar.right}>
              <span style={topBar.chip}>⏱ 90 min</span>
              <span style={{ ...topBar.chip, background: 'var(--signal-green)', color: '#fff', borderColor: 'var(--signal-green)' }}>1 deliverable</span>
              <button type="button" className="lesson-print-btn" onClick={() => window.print()}>Print worksheet</button>
            </div>
          </header>

          <nav style={rail.nav} aria-label="Module sections">
            <div style={rail.head}>CLASS FLOW</div>
            <div style={rail.list}>
              {sections.map((s, i) => (
                <button
                  key={s.id}
                  onClick={() => goto(s.id)}
                  aria-current={active === s.id ? 'location' : undefined}
                  aria-label={`Section ${i+1}: ${s.label}, ${s.time}`}
                  style={{
                    ...rail.item,
                    ...(active === s.id ? rail.itemActive : {}),
                  }}
                >
                  <span style={rail.idx}>{i.toString().padStart(2,'0')}</span>
                  <span style={rail.lbl}>{s.label}</span>
                  <span style={rail.time}>{s.time}</span>
                </button>
              ))}
            </div>
            <a href="../index.html" style={rail.back}>← Back to canvas</a>
          </nav>

          <main id="main-content" style={main.wrap}>
            <div style={{ paddingTop: 28 }}>
              {window.CourseArc && (
                <window.CourseArc currentKey="ai-copilot-camp" />
              )}
              {window.AsyncTrack && (
                <window.AsyncTrack
                  data={asyncTrack}
                  lessonKey="ai-copilot-camp"
                  totalTime="~95 min + Prompt Journal"
                  canvasHub="Canvas → Week 6 module"
                  intro={<><strong>Heads up:</strong> async mirror of Week 6. Pair audit runs as an asynchronous Canvas thread on Wed–Sun — facilitator pairs students Thursday. Same Prompt Journal take-home for both tracks.</>}
                />
              )}
            </div>
            {sections.map((s) => {
              const C = s.Cmp;
              const sc = engagement.selfChecks[s.id];
              const m = media[s.id];
              return (
                <section id={s.id} key={s.id} data-screen-label={`${s.label}`} style={main.section}>
                  {m && window.MediaSlot && (
                    <window.MediaSlot data={m} lessonKey="ai-copilot-camp" sectionId={s.id} />
                  )}
                  {C ? <C /> : <div style={{ padding: 80, color: 'var(--signal-red)' }}>Missing: {s.id}</div>}
                  {sc && window.SelfCheck && (
                    <window.SelfCheck data={sc} lessonKey="ai-copilot-camp" sectionId={s.id} />
                  )}
                </section>
              );
            })}

            {window.ReflectionJournal && (
              <window.ReflectionJournal data={engagement.reflection} lessonKey="ai-copilot-camp">
                {window.ExportWork && (
                  <window.ExportWork lessonKey="ai-copilot-camp" lessonTitle="Week 6 · AI Co-Pilot Camp" />
                )}
              </window.ReflectionJournal>
            )}

            {window.CaptureTemplate && (
              <window.CaptureTemplate data={captureTemplate} />
            )}

            <footer style={main.foot}>
              <div className="ascii-divider" style={{ color: 'var(--ink-300)', marginBottom: 18 }} aria-hidden="true">
{`+--------------------------------------------+
|  END OF MODULE  ·  fly your own plane      |
+--------------------------------------------+`}
              </div>
              <div style={{ fontFamily: 'var(--font-display)', fontSize: 26, fontStyle: 'italic', color: 'var(--ink-500)' }}>
                AI is the co-pilot. <span style={{ color: 'var(--crimson)' }}>You</span> still fly.
              </div>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-300)', letterSpacing: '0.15em', marginTop: 28 }}>
                INFO-T 100 · v2.0 · 2026
              </div>
            </footer>
          </main>
        </div>
      );
    }

    const topBar = {
      bar: {
        position: 'sticky', top: 0, zIndex: 50,
        display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'center',
        padding: '12px 32px',

      iuMark: {
        width: 26, height: 26, background: 'var(--crimson)', color: '#fff',

        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',

      title: { fontFamily: 'var(--font-display)', fontSize: 18, fontWeight: 600, fontStyle: 'italic', color: 'var(--paper-50)' },
      chip: {

    const rail = {
      nav: {
        position: 'fixed', top: 80, left: 32, width: 220,
        background: 'var(--paper-100)', border: '1px solid var(--paper-200)',

        fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-500)',
        textDecoration: 'none', textAlign: 'center',

    const main = {
      wrap: { marginLeft: 280, padding: '0 56px 0 24px', maxWidth: 1100 },
      section: { padding: '60px 0', borderBottom: '1px solid var(--paper-200)', minHeight: 'min-content' },
      foot: { padding: '90px 0 120px', textAlign: 'center' },
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
