    const asyncTrack = [
      { refId: 'cold', label: 'Cold open', soloTime: '6 min',

        deliverable: 'Start Log entries — facilitator spot-checks during 1:1s.' },
    ];

    const engagement = {
      selfChecks: {
        cold: {
          question: 'In one sentence: what does it cost to NOT externalize knowledge?',
          hint: 'Look at the W12-junior framing in the cold-open transcript. The cost is real — name the specific shape of the loss.',
          answer: 'Strong responses: you re-do work you already did, you can\'t cite your own prior reasoning, your future self has no record. The cost is invisible until W12 — that\'s why externalization is hard to motivate without seeing it land.'
        },
        r1: {
          question: 'In your own words: what\'s the difference between an editor and a terminal?',
          hint: 'They live next to each other in VS Code, but they do different jobs.',
          answer: 'Editor edits files; terminal runs commands. The editor is where you write code; the terminal is where you tell the computer to do something with it. Skilled users keep both open and switch between them constantly.'
        },
        r2: {
          question: 'What does `git commit` actually do — in your own words?',
          hint: 'Not "saves the file." Files are saved when you save them. Commit is something different.',
          answer: 'A commit is a labeled snapshot of the project at a moment in time. It records WHAT changed, WHO changed it, WHEN, and (via the message) WHY. Saving keeps your file. Committing keeps the history.'
        },
        r3: {
          question: 'Why are the IU library bookmarks separate from the Obsidian vault?',
          hint: 'Both are "externalization" surfaces. But they hold different kinds of stuff.',
          answer: 'Vault holds YOUR notes — the things you generated. Library holds OTHERS\' work — the credible sources you cite. Conflating them (e.g., copy-pasting a paper into your vault) loses the credibility chain. Keep them separate; link from one to the other.'
        },
        note: {
          question: 'In Section 4, why is the source rationale ("why I trust this") harder than finding the source?',
          hint: 'Finding a credible source through an IU database is mechanical — there\'s a button for it. Trusting it is a judgment.',
          answer: 'Mechanical work has clear steps; judgment work doesn\'t. The rationale forces you to articulate the credibility marker — peer review, replicable methodology, primary source — which is the part AI cannot do for you.'
        },
        wrap: {
          question: 'If you saw an "empty" row on the snapshot just now, what was it — and what\'s the smallest next move?',
          hint: 'Naming the smallest move is half of un-blocking. "Sit down with TA at office hours" is smaller than "fix everything."',
        },
        home: {
          question: 'When this week goes sideways and one of the three Start-Log lines slips, which one is most likely — and what\'s your counter-move?',
          hint: 'Pre-mortem. Naming the failure mode now makes the counter-move easier to remember.',
        },
      },
      reflection: {
        title: 'Setup Quest reflection',
        intro: 'Three short prompts. Auto-saves as you type. Hit "Copy for Canvas" when you\'re done and paste into the Week 3 reflection assignment.',
        prompts: [
          'Which install round felt the smoothest, and which one felt like dragging? What does that pattern tell you about your tooling habits?',
          'Your Obsidian vault now exists. What\'s the first non-coursework thing you\'d capture in it this week?',
          'When the IU library "no Google" constraint hit, what surprised you about the database surface?',
        ],
      },
    };

    const media = {
      cold: {
        type: 'placeholder',
        label: 'cold-open clip',
        caption: 'Cold open · why a second brain',
        src: '',
        transcript:
`Three weeks ago we found the toolbox. Two weeks ago we found the time. This week we make the third move that 80% of CS students never make on purpose — we externalize.

Most of you have already had the experience: you learned something in W2 — about your own time, about a tool, about a habit — and right now, three weeks later, you couldn't recall it without looking. That gap is normal. It's also expensive. By W12, that gap compounds. Junior-year you looks at sophomore-year you and asks "what did I learn?" — and the answer is invariably "I'm not sure."

The fix is not "study harder." The fix is "externalize." Take what you learned out of your head and put it somewhere searchable. Your notes app is one surface. Git history is another. The IU library is a third. Today we set up all three.

The job is two halves. By end of class your laptop will know how to run code — that's the standard CS install moment. AND your second brain will know how to keep what you learned — which most CS curricula skip entirely. Both halves matter. Skipping the second is how juniors look up at Week 12 and realize they have no idea what they did in Week 4.

Three install rounds. One first note. One credible source from an IU database, not Google. By the end of class, every artifact has a home.`
      },
    };

    const captureTemplate = {
      title: 'Setup Quest · Obsidian capture',
      target: 'Weeks/W03-setup-quest.md',
      intro: 'This is your first capture template. Drop it into your fresh vault as the very first note. The headings already match the lesson — fill them in as you go.',
      markdown: `---
type: lesson
week: 03
lesson: Setup Quest · Second Brain
date:${' '}
status: open
github_repo:${' '}
vault_path:${' '}
---

# Setup Quest — Week 3

## Anchor question
Can I run code AND keep my own notes?

## What I installed today
- Editor:${' '}
- Runtime:${' '}
- Version control:${' '}
- Note app:${' '}
- One thing that went sideways:${' '}

## My GitHub repo
${' '}

## My vault path
${' '}

## First credible source
- Title:${' '}
- Database (IU):${' '}
- Link:${' '}
- Why I trust this:${' '}

## Reflection
> Smoothest install round:

> Round that felt like dragging:

> What surprised me about the IU database surface:

## Links / related
- [[Sources/...]]
`,
    };

    function App() {
      const [active, setActive] = React.useState('cold');

      React.useEffect(() => {
        const opts = { rootMargin: '-30% 0px -55% 0px', threshold: 0 };
        const obs = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); });
        }, opts);
        sections.forEach(s => {
          const el = document.getElementById(s.id);
          if (el) obs.observe(el);
        });
        return () => obs.disconnect();
      }, []);

      const goto = (id) => {
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' });
      };

      return (
        <div style={{ position: 'relative' }}>
          <header style={topBar.bar}>
            <div style={topBar.left}>
              <span style={topBar.iuMark}>IU</span>
              <span style={topBar.crumb}>INFO-T 100 · WEEK 03</span>
            </div>
            <div style={topBar.center}>
              <span style={topBar.title}>Setup Quest · Second Brain</span>
            </div>
            <div style={topBar.right}>
              <span style={topBar.chip}>⏱ 90 min</span>
              <span style={{ ...topBar.chip, background: 'var(--signal-green)', color: '#fff', borderColor: 'var(--signal-green)' }}>4 deliverables</span>
              <button type="button" className="lesson-print-btn" onClick={() => window.print()}>Print worksheet</button>
            </div>
          </header>

          <nav style={rail.nav} aria-label="Module sections">
            <div style={rail.head}>CLASS FLOW</div>
            <div style={rail.list}>
              {sections.map((s, i) => (
                <button
                  key={s.id}
                  onClick={() => goto(s.id)}
                  aria-current={active === s.id ? 'location' : undefined}
                  aria-label={`Section ${i+1}: ${s.label}, ${s.time}`}
                  style={{ ...rail.item, ...(active === s.id ? rail.itemActive : {}) }}
                >
                  <span style={rail.idx}>{i.toString().padStart(2,'0')}</span>
                  <span style={rail.lbl}>{s.label}</span>
                  <span style={rail.time}>{s.time}</span>
                </button>
              ))}
            </div>
            <a href="../index.html" style={rail.back}>← Back to canvas</a>
          </nav>

          <main id="main-content" style={main.wrap}>
            <div style={{ paddingTop: 28 }}>
              {window.CourseArc && <window.CourseArc currentKey="setup-quest" />}
              {window.AsyncTrack && (
                <window.AsyncTrack
                  data={asyncTrack}
                  lessonKey="setup-quest"
                  totalTime="~106 min"
                  canvasHub="Canvas → Week 3 module"
                  intro={<><strong>Heads up:</strong> async mirror of Week 3. The install rounds work fine solo with the OS handouts, but you'll need ~25% more time without TAs at the table. The Setup Quest async help thread on Canvas is staffed during weekday daytime — TAs reply within 4 hours.</>}
                />
              )}
            </div>

            {sections.map((s) => {
              const C = s.Cmp;
              const sc = engagement.selfChecks[s.id];
              const m = media[s.id];
              return (
                <section id={s.id} key={s.id} data-screen-label={`${s.label}`} style={main.section}>
                  {m && window.MediaSlot && (
                    <window.MediaSlot data={m} lessonKey="setup-quest" sectionId={s.id} />
                  )}
                  {C ? <C /> : <div style={{ padding: 80, color: 'var(--signal-red)' }}>Missing: {s.id}</div>}
                  {sc && window.SelfCheck && (
                    <window.SelfCheck data={sc} lessonKey="setup-quest" sectionId={s.id} />
                  )}
                </section>
              );
            })}

            {window.ReflectionJournal && (
              <window.ReflectionJournal data={engagement.reflection} lessonKey="setup-quest">
                {window.ExportWork && (
                  <window.ExportWork lessonKey="setup-quest" lessonTitle="Week 3 · Setup Quest" />
                )}
              </window.ReflectionJournal>
            )}

            {window.CaptureTemplate && (
              <window.CaptureTemplate data={captureTemplate} />
            )}

            <footer style={main.foot}>
              <div style={{ color: 'var(--ink-300)', marginBottom: 18, fontFamily: 'var(--font-mono)', fontSize: 11, whiteSpace: 'pre' }} aria-hidden="true">
{`+----------------------------------------------------+
|  W03  ·  installed  ·  externalized  ·  yours  |
+----------------------------------------------------+`}
              </div>
              <div style={{ fontFamily: 'var(--font-display)', fontSize: 26, fontStyle: 'italic', color: 'var(--ink-500)' }}>
                The toolbox is now <span style={{ color: 'var(--crimson)' }}>yours</span>. The notes are now <span style={{ color: 'var(--crimson)' }}>yours</span>.
              </div>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-300)', letterSpacing: '0.15em', marginTop: 28 }}>
                INFO-T 100 · v2.0 · 2026
              </div>
            </footer>
          </main>
        </div>
      );
    }

    const topBar = {
      bar: { position: 'sticky', top: 0, zIndex: 50, display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'center', padding: '12px 32px', background: 'var(--ink-900)', color: 'var(--paper-100)', borderBottom: '3px solid var(--crimson)' },
      left: { display: 'flex', alignItems: 'center', gap: 12, justifySelf: 'start' },
      center: { justifySelf: 'center' },
      right: { display: 'flex', gap: 10, justifySelf: 'end', alignItems: 'center' },
      iuMark: { width: 26, height: 26, background: 'var(--crimson)', color: '#fff', fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 13, fontStyle: 'italic', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' },
      crumb: { fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--paper-300)', letterSpacing: '0.1em' },
      title: { fontFamily: 'var(--font-display)', fontSize: 18, fontWeight: 600, fontStyle: 'italic', color: 'var(--paper-50)' },
      chip: { fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.05em', border: '1px solid var(--paper-300)', color: 'var(--paper-100)', padding: '4px 8px', borderRadius: 3 },

    const rail = {
      nav: { position: 'fixed', top: 80, left: 32, width: 220, background: 'var(--paper-100)', border: '1px solid var(--paper-200)', padding: '18px 14px 14px', borderRadius: 6, boxShadow: 'var(--shadow-paper)', zIndex: 20 },
      head: { fontFamily: 'var(--font-mono)', fontSize: 10, fontWeight: 700, color: 'var(--ink-900)', letterSpacing: '0.18em', marginBottom: 14, paddingBottom: 10, borderBottom: '2px solid var(--ink-900)' },
      list: { display: 'flex', flexDirection: 'column', gap: 2 },
      item: { display: 'grid', gridTemplateColumns: '24px 1fr auto', alignItems: 'center', gap: 8, background: 'transparent', border: 'none', cursor: 'pointer', padding: '8px 10px', borderRadius: 3, textAlign: 'left', color: 'var(--ink-700)', fontFamily: 'var(--font-body)', fontSize: 12.5 },
      itemActive: { background: 'var(--ink-900)', color: 'var(--paper-50)' },
      idx: { fontFamily: 'var(--font-mono)', fontSize: 10, opacity: 0.7 },
      lbl: { fontWeight: 600 },
      time: { fontFamily: 'var(--font-mono)', fontSize: 9.5, opacity: 0.7 },
      back: { display: 'block', marginTop: 16, paddingTop: 12, borderTop: '1px dashed var(--paper-300)', fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-500)', textDecoration: 'none', textAlign: 'center' },
    };

    const main = {
      wrap: { marginLeft: 280, padding: '0 56px 0 24px', maxWidth: 1100 },
      section: { padding: '60px 0', borderBottom: '1px solid var(--paper-200)', minHeight: 'min-content' },
      foot: { padding: '90px 0 120px', textAlign: 'center' },
