  <script type="text/babel">
    const sections = [
      { id: 'icebreaker', label: 'Icebreaker',    time: '15 min', Cmp: window.SectionIcebreaker },
      { id: 'coldopen', label: 'Cold open',     time: '5 min',  Cmp: window.SectionColdOpen },
      { id: 'loop',     label: 'The Loop',      time: '8 min',  Cmp: window.SectionLoop },
      { id: 'demo',     label: 'Side-by-side',  time: '12 min', Cmp: window.SectionDemo },

      { id: 'pair',     label: 'Pair-debug',    time: '20 min', Cmp: window.SectionPairDebug },
      { id: 'home',     label: 'Take-home',     time: '10 min', Cmp: window.SectionTakeHome },
    ];

    const asyncTrack = [
      { refId: 'icebreaker', label: 'Icebreaker · stuck story', soloTime: '15 min posting + 10 min replying',
        activity: 'Post a "stuck story" anecdote in the Week\'s Discussion: a moment in the past month where you got stuck and couldn\'t move. Read three classmates\' stories and reply to two with one hypothesis each ("what might be happening underneath?").',
        deliverable: 'Canvas → Debugging Mindset → "Stuck stories" Discussion',
        peerLoop: 'Replies due within 48 h of your post.' },
      { refId: 'coldopen', label: 'Cold open', soloTime: '4 min',
        activity: 'Watch the recorded cold open or read the 1-page text version. Note one bug you fear most.',
        deliverable: 'Private — no posting required.',
        recording: 'Linked at top of Canvas → Debugging Mindset.' },
      { refId: 'loop', label: 'The Loop', soloTime: '6 min',
        activity: 'Read The Loop overview (notice → reproduce → narrow → fix → record). Skim once; you\'ll execute it on a real bug in the Bug Report step.',
        deliverable: 'No deliverable for this step.' },
      { refId: 'demo', label: 'Side-by-side demo', soloTime: '12 min',
        activity: 'Watch the recorded side-by-side debug demo (linked in Canvas). The demo follows The Loop on a real student bug. No posting — just absorb.',
        deliverable: 'Private — no posting required.',
        recording: 'Linked in Canvas → Debugging Mindset.' },
      { refId: 'report', label: 'Bug report', soloTime: '25 min',
        activity: 'Fill in the Bug Report form below using a real bug from your current course or project. The form auto-saves to your browser. Submit when complete.',
        deliverable: 'Canvas → Debugging Mindset → "Bug report" assignment (export form or screenshot).' },
      { refId: 'pair', label: 'Pair-debug (async)', soloTime: '20 min posting + 15 min replying',
        activity: 'Async pair-debug: post your bug report to the dedicated Canvas thread by Wednesday. The facilitator pairs students Thursday morning. Use the pair-debug checklist (linked in Canvas) when reading your partner\'s post — name one new hypothesis they didn\'t consider.',
        deliverable: 'Canvas → Debugging Mindset → "Pair-debug" thread — post by Wed, reply to your pair by Sun.',
        peerLoop: 'Pairing is automatic; the facilitator posts pairs Thursday.' },
      { refId: 'home', label: 'Take-home', soloTime: '10 min',
        activity: 'Same as the in-class take-home: log the next bug you hit this week using The Loop. One paragraph in your Start Log.',
        deliverable: 'Start Log entry — facilitator spot-checks during 1:1s.' },
    ];

    const engagement = {
      selfChecks: {
        icebreaker: {
          question: 'In your stuck story, what was the actual blocker — versus what you thought it was at the time?',
          hint: 'Almost every "stuck" moment has a surface cause and an underneath cause. They\'re usually different.',
          answer: 'Common pattern: the surface story is technical ("the test wouldn\'t pass"), the underneath story is procedural or emotional ("I didn\'t want to read the error message" / "I assumed it was something I\'d never understand").'
        },
        coldopen: {
          question: 'Which kind of bug do you fear most — and what does that fear protect you from finding out?',
          hint: 'Fear of bugs is rarely about the bug itself. It\'s usually about what the bug would mean if you couldn\'t fix it.',
          answer: 'Most students fear "silent" bugs (code runs, output looks wrong) or "I don\'t even understand the error" bugs. Both fears are usually about identity ("maybe I don\'t belong here") more than capability.'
        },
        loop: {
          question: 'In one sentence each: notice, reproduce, narrow, fix, record. What does each step actually do?',
          hint: 'They\'re a sequence; skipping any one of them is where most stuck moments come from.',
          answer: 'Notice: name what\'s actually wrong, in your words. Reproduce: make the bug happen on demand. Narrow: cut the surface area until the bug is in one place. Fix: change the smallest thing that makes it work. Record: write down what you learned so future-you doesn\'t pay this cost again.'
        },
        demo: {
          question: 'In the demo, where did the debugger\'s thinking diverge from where you would have looked first?',
          hint: 'Skilled debuggers are unsurprised by failure. Where did the demo not panic when you would have?',
          answer: 'Common moment: the demo reads the error message slowly and treats it as information, where students often skim or panic at the first traceback. The reading itself is the move.'
        },
        report: {
          question: 'In your bug report, which field was hardest to fill in — and what does that tell you?',
          hint: 'The hardest field is usually the one you usually skip in real life.',
          answer: 'Most students struggle with "expected behavior" or "smallest reproduction." Those are also the fields that make the bug actually solvable. The struggle is the symptom.'
        },
        pair: {
          question: 'In your partner\'s bug report, what hypothesis did you generate that they hadn\'t considered?',
          hint: 'Your job in pair-debug is to bring the outside angle. Don\'t just confirm their guess.',
          answer: 'Strong audits add a hypothesis the original author missed — usually because the author was anchored on what they\'d already tried. Naming the un-tried path is the most valuable move.'
        },
        home: {
          question: 'On the next bug you hit this week, where do you predict you\'ll skip a step in The Loop — and what\'s your counter-move?',
          hint: 'Most students skip "reproduce" or "record." The counter-move is usually a 60-second timer, not willpower.',
        },
      },
      reflection: {
        title: 'Debugging Mindset reflection',
        intro: 'Three short prompts. Auto-saves as you type. Hit "Copy for Canvas" when you\'re done and paste into the lesson reflection assignment.',
        prompts: [
          'What was the moment in this lesson where your relationship to bugs actually shifted (if it did)?',
          'Which step of The Loop are you most likely to skip — and what\'s the smallest thing that would help you not skip it?',
          'Next time you\'re stuck, what\'s the new first move you want to try instead of your current one?',
        ],
      },
    };

    const captureTemplate = {
      title: 'Debugging Mindset · Obsidian capture',
      target: 'Bugs/W05-bug-report.md',
      intro: 'This template lives in Bugs/ — start a new note for each bug you log this semester. The structured fields are the same ones the in-class form uses, so paste your form output here when you submit.',
      markdown: `---
type: bug
week: 05
lesson: Debugging Mindset
date:${' '}
status: open
language:${' '}
project:${' '}
---

# Bug — [short summary]

## Stuck story (icebreaker)
- Surface story (what I told myself):${' '}
- Underneath story (what was actually going on):${' '}

## The Loop · this bug
1. **Notice** — what's wrong, in my words:${' '}
2. **Reproduce** — smallest steps that trigger it:${' '}
3. **Narrow** — where in the code:${' '}
4. **Fix** — what I changed:${' '}
5. **Record** — the lesson, in one sentence:${' '}

## Hypotheses I haven't tried
-${' '}

## Pair-debug reply (from partner)
- New hypothesis they raised:${' '}
- Was it right? Y / N

## Reflection
> The moment my relationship to bugs shifted (or didn't):

> Step of The Loop I'm most likely to skip — and the smallest help:

> Next time I'm stuck, my new first move:

## Links / related bugs
- [[Bugs/...]]
`,
    };

    const media = {
      coldopen: {
        type: 'placeholder',
        label: 'cold-open clip',
        caption: 'Cold open · the bug you\'re afraid of',
        src: '',
        transcript:
`There is a bug, somewhere in your code right now or in code you'll write this semester, that you are going to be afraid of. Not 'frustrated by' — afraid of. The kind of bug where you read the error message and feel a little drop in your stomach because you don't even understand what it's asking you to fix.

The fear is not about the bug. The fear is about what the bug means. If you can't fix this one, what does that say? About whether you should be in this major? About whether you're as smart as you thought? That's the actual cost of the bug. The actual fix is usually a thirty-second move you couldn't see because you were too busy negotiating with the fear.

Skilled debuggers don't have a different brain. They have a different relationship to bugs. They treat error messages like information, not verdicts. They reproduce the bug on purpose, where most beginners flinch away from it. They narrow the problem before they try to solve it. And they record what they learned so the next bug of the same shape costs less.

The loop we're going to run today is five steps: notice, reproduce, narrow, fix, record. None of them is heroic. The reason this works is the same reason audit-map-triage-rebudget works in Compute Time — the steps are small enough that fear can't hide a whole one of them.

Today's goal: by the end of this lesson, you have one bug — a real one, from your actual coursework — written up in a structured bug report. Not solved. Just seen clearly. Because half of debugging is naming what's actually wrong. The other half follows.`
      },
      demo: {
        type: 'placeholder',
        label: 'side-by-side debug demo',
        caption: 'Side-by-side · The Loop on a real student bug',
        src: '',
        transcript:
`Here's the demo. We're going to take a real bug from a CSCI-Y100 student last semester — a Python function that should return a sorted list and instead returns the original list with one item duplicated. The student's reaction, in their words: 'I have NO idea what's happening, please help.'

Step one is notice. Reading the error message slowly. There is no error message — the function runs. The output is just wrong. That's a clue: the bug is logical, not syntactic. Skilled debuggers love a no-error bug because the trace is hiding in the output, not in red text.

Step two is reproduce. We isolate the function and call it with three different inputs: an empty list, a single-item list, a five-item list. Empty: works. Single: works. Five: fails. So the bug only shows up at length ≥ 2 — interesting. We just localized it without changing any code.

Step three is narrow. We add one print statement inside the loop. Now we can see exactly where the duplicate enters: the loop variable is being mutated by the function we're calling on each iteration. The bug isn't in this function at all. It's in the helper. We've found it without 'fixing' anything.

Step four is fix. We make a copy of the input before passing it to the helper. One line. The function now sorts correctly on every input. Total time: about four minutes. Most of which was reading and reproducing, not coding.

Step five is record. We write down the lesson: 'helpers can mutate their inputs; if a function works on small inputs and fails on bigger ones, suspect aliasing.' That note is now in the student's debugging journal. Future-them, six weeks from now, will hit a similar bug and remember.

Notice what we didn't do: we didn't panic, we didn't ask Claude to explain the whole codebase, we didn't rewrite the function from scratch. We followed the loop. The loop is what made a thirty-second fix feel like a thirty-second fix instead of an existential crisis.`
      },
    };

    function App() {
      const [active, setActive] = React.useState('coldopen');

      // Scroll-spy: highlight nav based on which section is in view.

        const opts = { rootMargin: '-30% 0px -55% 0px', threshold: 0 };
        const obs = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); });
        }, opts);
        sections.forEach(s => {
          const el = document.getElementById(s.id);
          if (el) obs.observe(el);
        });
        return () => obs.disconnect();
      }, []);

      const goto = (id) => {
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' });
      };

      return (
        <div style={{ position: 'relative' }}>
          {/* Top bar */}
          <header style={topBar.bar}>
            <div style={topBar.left}>
              <span style={topBar.iuMark}>IU</span>
              <span style={topBar.crumb}>CSCI-Y100 · WEEK 05</span>
            </div>
            <div style={topBar.center}>
              <span style={topBar.title}>The Debugging Mindset</span>
            </div>
            <div style={topBar.right}>
              <span style={topBar.chip}>⏱ 90 min</span>
              <span style={{ ...topBar.chip, background: 'var(--signal-green)', color: '#fff', borderColor: 'var(--signal-green)' }}>1 deliverable</span>
              <button type="button" className="lesson-print-btn" onClick={() => window.print()}>Print worksheet</button>
            </div>
          </header>

          {/* Side rail nav (sticky) */}
          <nav style={rail.nav} aria-label="Module sections">
            <div style={rail.head}>CLASS FLOW</div>
            <div style={rail.list}>
              {sections.map((s, i) => (
                <button
                  key={s.id}
                  onClick={() => goto(s.id)}
                  aria-current={active === s.id ? 'location' : undefined}
                  aria-label={`Section ${i+1}: ${s.label}, ${s.time}`}
                  style={{
                    ...rail.item,
                    ...(active === s.id ? rail.itemActive : {}),
                  }}
                >
                  <span style={rail.idx}>{(i+1).toString().padStart(2,'0')}</span>
                  <span style={rail.lbl}>{s.label}</span>
                  <span style={rail.time}>{s.time}</span>
                </button>
              ))}
            </div>
            <a href="../index.html" style={rail.back}>← Back to canvas</a>
          </nav>

          {/* Main content */}
          <main id="main-content" style={main.wrap}>
            <div style={{ paddingTop: 28 }}>
              {window.CourseArc && (
                <window.CourseArc currentKey="debugging-mindset" />
              )}
              {window.AsyncTrack && (
                <window.AsyncTrack
                  data={asyncTrack}
                  lessonKey="debugging-mindset"
                  totalTime="~107 min across the week"
                  canvasHub="Canvas → Debugging Mindset module"
                  intro={<><strong>Heads up:</strong> async mirror of this module. Pair-debug runs as a Canvas thread on Wed–Sun — facilitator pairs students Thursday. Same Bug Report deliverable for both tracks.</>}
                />
              )}
            </div>
            {sections.map((s) => {
              const C = s.Cmp;
              const sc = engagement.selfChecks[s.id];
              const m = media[s.id];
              return (
                <section id={s.id} key={s.id} data-screen-label={`${s.label}`} style={main.section}>
                  {m && window.MediaSlot && (
                    <window.MediaSlot data={m} lessonKey="debugging-mindset" sectionId={s.id} />
                  )}
                  {C ? <C /> : <div style={{ padding: 80, color: 'var(--signal-red)' }}>Missing: {s.id}</div>}
                  {sc && window.SelfCheck && (
                    <window.SelfCheck data={sc} lessonKey="debugging-mindset" sectionId={s.id} />
                  )}
                </section>
              );
            })}

            {window.ReflectionJournal && (
              <window.ReflectionJournal data={engagement.reflection} lessonKey="debugging-mindset">
                {window.ExportWork && (
                  <window.ExportWork lessonKey="debugging-mindset" lessonTitle="The Debugging Mindset" />
                )}
              </window.ReflectionJournal>
            )}

            {window.CaptureTemplate && (
              <window.CaptureTemplate data={captureTemplate} />
            )}

            {/* Footer */}
            <footer style={main.foot}>
              <div className="ascii-divider" style={{ color: 'var(--ink-300)', marginBottom: 18 }} aria-hidden="true">
{`+--------------------------------------------+
|  END OF MODULE  ·  see you next week       |
+--------------------------------------------+`}
              </div>
              <div style={{ fontFamily: 'var(--font-display)', fontSize: 26, fontStyle: 'italic', color: 'var(--ink-500)' }}>
                go forth & debug yourselves.
              </div>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-300)', letterSpacing: '0.15em', marginTop: 28 }}>
                CSCI-Y100 · v2.0 · 2026
              </div>
            </footer>
          </main>
        </div>
      );
    }

    const topBar = {
      bar: {
        position: 'sticky', top: 0, zIndex: 50,
        display: 'grid', gridTemplateColumns: '1fr auto 1fr', alignItems: 'center',

      },

      iuMark: {

      crumb: { fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--paper-300)', letterSpacing: '0.1em' },
      title: { fontFamily: 'var(--font-display)', fontSize: 18, fontWeight: 600, fontStyle: 'italic', color: 'var(--paper-50)' },
      chip: {
        fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.05em',
        border: '1px solid var(--paper-300)', color: 'var(--paper-100)',

      },
    };

    const rail = {
      nav: {
        position: 'fixed', top: 80, left: 32, width: 220,
        background: 'var(--paper-100)', border: '1px solid var(--paper-200)',
        padding: '18px 14px 14px', borderRadius: 6,
        boxShadow: 'var(--shadow-paper)',
        zIndex: 20,
      },
      head: {
        fontFamily: 'var(--font-mono)', fontSize: 10, fontWeight: 700,
        color: 'var(--ink-900)', letterSpacing: '0.18em',
        marginBottom: 14, paddingBottom: 10, borderBottom: '2px solid var(--ink-900)',
      },
      list: { display: 'flex', flexDirection: 'column', gap: 2 },
      item: {
        display: 'grid', gridTemplateColumns: '24px 1fr auto', alignItems: 'center', gap: 8,
        background: 'transparent', border: 'none', cursor: 'pointer',

      },

        background: 'var(--ink-900)', color: 'var(--paper-50)',
      },
      idx: { fontFamily: 'var(--font-mono)', fontSize: 10, opacity: 0.7 },

        display: 'block', marginTop: 16, paddingTop: 12, borderTop: '1px dashed var(--paper-300)',
        fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-500)',
        textDecoration: 'none', textAlign: 'center',
      },
    };

    const main = {
      wrap: { marginLeft: 280, padding: '0 56px 0 24px', maxWidth: 1100 },
      section: { padding: '60px 0', borderBottom: '1px solid var(--paper-200)', minHeight: 'min-content' },
      foot: { padding: '90px 0 120px', textAlign: 'center' },
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
