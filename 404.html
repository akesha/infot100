<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 · Page not found · INFO-T 100</title>
  <meta name="description" content="Page not found in the INFO-T 100 course redesign explorations." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600;1,9..144,700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css" />
  <style>
    html, body { margin: 0; padding: 0; background: var(--paper-200); color: var(--ink-900); font-family: var(--font-body); }
    .wrap {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px;
      background-image: radial-gradient(circle at 1px 1px, rgba(22,20,15,0.10) 1.5px, transparent 0);
      background-size: 22px 22px;
    }
    .card {
      max-width: 560px;
      background: var(--paper-50);
      border: 2px solid var(--ink-900);
      padding: 40px 44px;
      box-shadow: 8px 8px 0 var(--ink-900);
    }
    .stamp {
      display: inline-block; border: 2.5px solid var(--crimson);
      color: var(--crimson); font-family: var(--font-mono);
      font-size: 11px; font-weight: 700; letter-spacing: 0.18em;
      padding: 6px 12px; transform: rotate(-3deg); margin-bottom: 14px;
    }
    h1 {
      font-family: var(--font-display); font-style: italic; font-weight: 700;
      font-size: 76px; line-height: 0.95; letter-spacing: -0.02em;
      margin: 0 0 12px;
    }
    h1 em { color: var(--crimson); }
    p { font-size: 16px; line-height: 1.5; margin: 0 0 16px; }
    .btn {
      display: inline-block;
      background: var(--ink-900); color: var(--paper-50);
      font-family: var(--font-mono); font-weight: 700;
      font-size: 13px; letter-spacing: 0.12em;
      padding: 12px 22px; text-decoration: none;
      margin-top: 8px;
    }
    .btn:hover { background: var(--crimson); }
    .crumb { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; color: var(--ink-500); margin-top: 18px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="stamp">404 — NOT FOUND</div>
      <h1>This page <em>doesn't exist</em> yet.</h1>
      <p>You probably followed a link to a module that hasn't been built (or the URL got mangled). Head back to the index and you'll find everything that <em>is</em> here.</p>
      <a class="btn" href="./">← BACK TO INDEX</a>
      <div class="crumb">INFO-T 100 · COURSE REDESIGN EXPLORATIONS</div>
    </div>
  </div>
</body>
</html>
