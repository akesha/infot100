<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>INFO-T 100 · Course Redesign Explorations</title>
  <meta name="description" content="INFO-T 100 Luddy Study Skills course redesign — interactive landing, 8-week quest map, sample debugging-mindset module, and pitch board for nine more module ideas." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500;1,9..144,600&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="tokens.css" />

  <style>
    html, body { margin: 0; padding: 0; background: #E5DFD0; }
    body { font-family: var(--font-body); }
    @keyframes blink {
      0%, 50% { opacity: 1; }
      50.01%, 100% { opacity: 0; }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>
  <main id="main" role="main"><div id="root"></div></main>
  <noscript>
    <div style="max-width:640px;margin:60px auto;padding:24px 28px;background:#FBF7F0;border:2px solid #16140F;font-family:Inter,system-ui,sans-serif;line-height:1.55;">
      <h1 style="font-family:Georgia,serif;font-style:italic;margin:0 0 10px;">JavaScript needed</h1>
      <p>This page renders an interactive React canvas. Please enable JavaScript to see the course redesign explorations. The individual module HTML files in <code>modules/</code> also require JavaScript.</p>
    </div>
  </noscript>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="artboards/landing.jsx"></script>
  <script type="text/babel" src="artboards/quest-map.jsx"></script>
  <script type="text/babel" src="artboards/debugging.jsx"></script>
  <script type="text/babel" src="artboards/pitch-board.jsx"></script>
  <script type="text/babel" src="artboards/built-modules.jsx"></script>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard } = window;

    function App() {
      return (
        <DesignCanvas>
          <DCSection
            id="overview"
            title="INFO-T 100 · Course Redesign Explorations"
            subtitle="Four ways to look at the same redesign — recruit, structure, sample module, brainstorm. Drag to reorder, double-click any artboard to focus."
          >
            <DCArtboard id="landing" label="① Course landing page · for catalog & recruiting" width={1280} height={1900}>
              <LandingArtboard />
            </DCArtboard>
            <DCArtboard id="questmap" label="② 8-week quest map · structure at a glance" width={1280} height={2200}>
              <QuestMapArtboard />
            </DCArtboard>
            <DCArtboard id="debugging" label="③ Sample module: 'Debugging Mindset' · interactive — try it" width={1280} height={1750}>
              <DebuggingArtboard />
            </DCArtboard>
            <DCArtboard id="pitchboard" label="④ Pitch board · 9 module ideas for colleagues" width={1280} height={1900}>
              <PitchBoardArtboard />
            </DCArtboard>
          </DCSection>

          <DCSection
            id="built"
            title="Fully built modules · click to enter"
            subtitle="Two weeks of the redesigned course, prototyped end-to-end as 90-minute interactive experiences."
          >
            <DCArtboard id="builtmodules" label="Reimagined modules · live & clickable" width={1760} height={780}>
              <BuiltModulesArtboard />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
